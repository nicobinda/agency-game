    .mission-naturaleza    { background:#042f2e; color:#99f6e4; }
    .mission-retail        { background:#082f49; color:#7dd3fc; }

    .card-item:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,.22); }
    .card-portrait  { width:220px; height:308px; }
    .card-landscape { width:390px; height:272px; }

    .card-divider { border:none; border-top:1px solid #ccc7be; margin:0; }
    /* ── Mission backgrounds (client cards) ── */
    .mission-bg-arte            { background:#ede8f2; border-color:#b8a8d0 !important; }
    .mission-bg-deporte         { background:#e6eef5; border-color:#90aac4 !important; }
    .mission-bg-entretenimiento { background:#f5ede8; border-color:#c8a890 !important; }
    .mission-bg-finanzas        { background:#e6ede4; border-color:#90aa88 !important; }
    .mission-bg-gastronomia     { background:#f5ede0; border-color:#c8a870 !important; }
    .mission-bg-naturaleza      { background:#e8f0e8; border-color:#88aa88 !important; }
    .mission-bg-retail          { background:#ede8f0; border-color:#b0a0c8 !important; }
    .mission-bg-tecnologia      { background:#e4eaf5; border-color:#8898c8 !important; }
    .mission-bg-viajes          { background:#e6f4f0; border-color:#78aaa0 !important; }

    .set-item.active { background:#1a2040; color:#f1f5f9; font-weight:600; }

    .range-slider { width:100%; accent-color:#6366f1; }
    .app-logo { font-size:15px; font-weight:900; letter-spacing:-0.5px; }

    select.edit-input { appearance:none; }
    [draggable="true"] { touch-action: none; -webkit-user-select: none; user-select: none; }

<script>
/* ── Immediate touch-to-drag for mobile/iPad ── */
(function () {
  var dragging = false, dragSrc = null, ghost = null, lastOver = null;
  var offX = 0, offY = 0;

  function makeGhost(src, tx, ty) {
    var r = src.getBoundingClientRect();
    offX = tx - r.left;
    offY = ty - r.top;
    var g = src.cloneNode(true);
    g.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;opacity:0.85;'
      + 'margin:0;transition:none;transform:scale(1.05);'
      + 'width:' + r.width + 'px;height:' + r.height + 'px;'
      + 'left:' + r.left + 'px;top:' + r.top + 'px;';
    document.body.appendChild(g);
    return g;
  }

  function fire(el, type, cx, cy) {
    try { el.dispatchEvent(new DragEvent(type, { bubbles: true, cancelable: true, clientX: cx||0, clientY: cy||0 })); }
    catch(e) {
      var ev = document.createEvent('Event');
      ev.initEvent(type, true, true);
      el.dispatchEvent(ev);
    }
  }

  function elAt(x, y) {
    if (ghost) ghost.style.visibility = 'hidden';
    var el = document.elementFromPoint(x, y);
    if (ghost) ghost.style.visibility = '';
    return el;
  }

  document.addEventListener('touchstart', function (e) {
    var src = e.target.closest('[draggable="true"]');
    if (!src) return;
    e.preventDefault();
    var t = e.touches[0];
    dragging = true; dragSrc = src;
    ghost = makeGhost(src, t.clientX, t.clientY);
    fire(src, 'dragstart');
  }, { passive: false });

  document.addEventListener('touchmove', function (e) {
    if (!dragging) return;
    e.preventDefault();
    var t = e.touches[0];
    ghost.style.left = (t.clientX - offX) + 'px';
    ghost.style.top  = (t.clientY - offY) + 'px';
    var el = elAt(t.clientX, t.clientY);
    if (el !== lastOver) {
      if (lastOver) fire(lastOver, 'dragleave', t.clientX, t.clientY);
      lastOver = el;
    }
    if (el) fire(el, 'dragover', t.clientX, t.clientY);
  }, { passive: false });

  document.addEventListener('touchend', function (e) {
    if (!dragging) return;
    var t = e.changedTouches[0];
    var el = elAt(t.clientX, t.clientY);
    if (el) fire(el, 'drop', t.clientX, t.clientY);
    fire(dragSrc, 'dragend', t.clientX, t.clientY);
    ghost.remove();
    ghost = null; dragging = false; dragSrc = null; lastOver = null;
  }, { passive: false });

  document.addEventListener('touchcancel', function () {
    if (!dragging) return;
    fire(dragSrc, 'dragend');
    if (ghost) ghost.remove();
    ghost = null; dragging = false; dragSrc = null; lastOver = null;
  });
})();
</script>

// MoneyTag: renders a monetary value with small K, green for fees/income, red for costs
function MoneyTag({ amount, type = 'cost', style = {} }) {
  if (amount === undefined || amount === null) return null;
  const color = type === 'fee' ? '#4ade80' : '#f87171';
  return (
    <span style={{ color, fontWeight: 700, whiteSpace: 'nowrap', ...style }}>
      {amount}<span style={{ fontSize: '0.68em', fontWeight: 600, marginLeft: '1px', opacity: 0.85 }}>K</span>
    </span>
  );
}
const CostDisplay = ({cost}) => <MoneyTag amount={cost} type="cost"/>;

function CultureReq({ value }) {
  if (!value || value <= 0) return null;
  return (
    <div style={{fontSize:8.5, color:'#888', fontWeight:700, lineHeight:1.2, letterSpacing:'0.3px'}}>
      ✦{value}
    </div>
  );
}

function CostBox({ cost, recurring, align='center', bigSize=22 }) {
  const isRed = recurring;
  const display = recurring ? cost : (cost || 0);
  const color = isRed ? '#cc2222' : '#111111';
  return (
    <div style={{
      borderLeft:'1px solid #ccc7be', padding:'4px 9px', textAlign:align,
      display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center',
      minWidth:54, flexShrink:0, alignSelf:'stretch'
    }}>
      <CultureReq value={0}/>
      <div style={{fontSize:bigSize, fontWeight:900, lineHeight:1, color, fontFamily:'Inter,sans-serif'}}>
        {display}<span style={{fontSize:bigSize*0.52, fontWeight:700}}>K</span>
      </div>
      {isRed && <div style={{fontSize:7.5, color:'#cc2222', fontWeight:700, lineHeight:1.3}}>por turno</div>}
    </div>
  );
}

function missionBarTextColor(hex) {
  if (!hex) return '#111';
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) > 145 ? '#111111' : '#ffffff';
}

function CardItem({card,onClick}) {
  const t = card.type;
  const typeCls = TYPE_CONFIG[t] ? `card-${TYPE_CONFIG[t].cls}` : '';
  const isLandscape = t === 'cliente';
  const misionBgCls = isLandscape && card.mision ? `mission-bg-${card.mision}` : '';
  const sizeCls = isLandscape ? 'card-landscape' : 'card-portrait';
  const cls = ['card-item', typeCls, sizeCls, misionBgCls].filter(Boolean).join(' ');
  return (
    <div className={cls} onClick={()=>onClick(card)}>
      {t==='talento'&&<CardTalento card={card}/>}
      {t==='cliente'&&<CardCliente card={card}/>}
      {t==='inversion'&&<CardInversion card={card}/>}
      {t==='estrategia'&&<CardEstrategia card={card}/>}
      {t==='accion_urgente'&&<CardUrgente card={card}/>}
    </div>
  );
}

// ─── CSV IMPORT HELPERS ───────────────────────────────────────────────────────

function parseCSV(text) {
  // Strip UTF-8 BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  // Split into lines respecting quoted newlines
  const lines = [];
  let cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === '\r') {
      // skip carriage returns
    } else if (c === '\n' && !inQ) {
      lines.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  if (cur) lines.push(cur);
  // Parse each line into fields
  return lines.filter(l => l.trim()).map(line => {
    const fields = []; let f = '', q = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (q && line[i+1] === '"') { f += '"'; i++; }
        else q = !q;
      } else if (c === ',' && !q) { fields.push(f); f = ''; }
      else f += c;
    }
    fields.push(f);
    return fields;
  });
}

function decodeResources(str) {
  if (!str || !str.trim()) return [];
  const INITIAL_TO_TYPE = { C:'creativo', D:'desarrollo', A:'analista', M:'manager', H:'hibrido' };
  const counts = {};
  for (const ch of str.toUpperCase()) {
    if (INITIAL_TO_TYPE[ch]) counts[ch] = (counts[ch]||0) + 1;
  }
  return Object.entries(counts).map(([k, qty]) => ({ type: INITIAL_TO_TYPE[k], qty }));
}

function csvRowToCard(headers, row) {
  const get = col => { const i = headers.indexOf(col); return i >= 0 ? (row[i]||'') : ''; };
  const num = col => { const v = get(col); return v !== '' ? Number(v) : null; };
  const tipo = get('tipo');
  const id = get('id') || `${tipo}-${Date.now()}-${Math.floor(Math.random()*9999)}`;
  const effects = () => get('efectos') ? get('efectos').split(' | ').filter(Boolean).map(d=>({description:d})) : [];
  const base = { id, type:tipo, name:get('nombre'), flavorText:get('flavor_text'), artDescription:get('descripcion_arte'), artImage:null };

  if (tipo === 'talento') return {
    ...base, mision: get('mision') || null,  // preserve null for hybrid (no mission)
    cost: num('costo')??0, recurringCost: num('costo_recurrente'),
    cultureRequirement:num('cultura_requerida'),
    resources: decodeResources(get('recursos_producidos')),
    effects: effects(),
  };
  if (tipo === 'cliente') {
    const levels = [];
    for (let n = 1; n <= 3; n++) {
      const reqs = decodeResources(get(`nivel${n}_recursos`));
      const fee = get(`nivel${n}_fee`);
      if (reqs.length > 0 || fee !== '') levels.push({
        level: n, requirements: reqs,
        fee: fee !== '' ? Number(fee) : 0,
        cultureRequirement: num(`nivel${n}_cultura_req`),
      });
    }
    return { ...base, mision:get('mision'), effects:[], levels };
  }
  if (tipo === 'inversion') return {
    ...base, cost:num('costo')??0, recurringCost:num('costo_recurrente'),
    bgColor:get('color_fondo')||'#2D4A3E', effects:effects(),
  };
  if (tipo === 'estrategia') return {
    ...base, cost:num('costo')??0, persistent:get('persistente')==='SI',
    bgColor:get('color_fondo')||'#2D2040', effects:effects(),
  };
  if (tipo === 'accion_urgente') return {
    ...base, cost:num('costo')??0,
    bgColor:get('color_fondo')||'#3D1515', effects:effects(),
  };
  return base;
}

// ─── CREATE CARD ──────────────────────────────────────────────────────────────

function defaultForType(type) {
  const base = { name:'Nueva carta', cost:3, flavorText:'', artDescription:'', effects:[{description:''}], artImage:null };
  if (type==='talento')       return {...base, mision:'arte', recurringCost:null, cultureRequirement:null, resources:[{type:'creativo',qty:1}]};
  if (type==='cliente')       return { name:'Nuevo cliente', mision:'arte', flavorText:'', artDescription:'', artImage:null, effects:[], levels:[{level:1, requirements:[{type:'creativo',qty:1}], fee:3, cultureRequirement:null}] };
  if (type==='inversion')     return {...base, recurringCost:null, bgColor:'#2D4A3E'};
  if (type==='estrategia')    return {...base, persistent:false, bgColor:'#2D2040'};
  if (type==='accion_urgente')return {...base, bgColor:'#3D1515'};
  return base;
}

            </div>
          </div>
        </div>
        <div className="modal-body">
          {t==='talento'&&<ModalTalento card={card}/>}
          {t==='cliente'&&<ModalCliente card={card}/>}
          {t==='inversion'&&<ModalInversion card={card}/>}
          {t==='estrategia'&&<ModalEstrategia card={card}/>}
          {t==='accion_urgente'&&<ModalUrgente card={card}/>}
          {card.effects&&card.effects.length>0&&(
            <div className="modal-field" style={{marginTop:16}}>
              <div className="modal-label">Efectos</div>
              {card.effects.map((e,i)=><EffectBlock key={i} effect={e}/>)}
            </div>
          )}
          {card.artDescription&&(
            <div className="modal-field">
              <div className="modal-label">Descripción de arte</div>
              <div className="modal-value" style={{color:'#94a3b8',fontStyle:'italic'}}>{card.artDescription}</div>
            </div>
          )}
          {card.flavorText&&(
            <div className="modal-field">
              <div className="modal-label">Flavor text</div>
              <div className="modal-value" style={{fontStyle:'italic',color:'#94a3b8',borderLeft:'3px solid #2d3347',paddingLeft:10}}>"{card.flavorText}"</div>
            </div>
          )}
          <div style={{marginTop:8,fontSize:11,color:'#475569'}}>ID: {card.id}</div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  // ── Card Set Management ──
  const defaultCards = useMemo(()=>[
    ...CARDS_DATA.clients.map(c=>({...c,type:'cliente'})),
    ...CARDS_DATA.talents,
    ...CARDS_DATA.investments.map(c=>({...c,type:'inversion'})),
    ...CARDS_DATA.strategies.map(c=>({...c,type:'estrategia'})),
    ...CARDS_DATA.urgent_actions.map(c=>({...c,type:'accion_urgente'})),
  ],[]);

  const [sets, setSets]                 = useState([{name:'Default', cards:defaultCards}]);
  const [activeSetIdx, setActiveSetIdx] = useState(0);
  const [newSetName, setNewSetName]     = useState('');
  const loadInputRef  = useRef(null);
  const importCsvRef  = useRef(null);

  const cards = sets[activeSetIdx]?.cards ?? [];
  const setCards = useCallback(updater => {
    setSets(prev => {
      const next = [...prev];
      next[activeSetIdx] = {
        ...next[activeSetIdx],
        cards: typeof updater === 'function' ? updater(next[activeSetIdx].cards) : updater,
      };
      return next;
    });
  }, [activeSetIdx]);

  // ── Filters ──
  const [typeFilter,setTypeFilter]       = useState('all');
  const [missionFilter,setMissionFilter] = useState('all');
  const [search,setSearch]               = useState('');
  const [maxCost,setMaxCost]             = useState(20);
  const [selectedCard,setSelectedCard]   = useState(null);
  const [editCard,setEditCard]           = useState(null);
  const [showCreate,setShowCreate]       = useState(false);

  const typeCounts = useMemo(()=>{
    const c={all:cards.length};
    ['talento','cliente','inversion','estrategia','accion_urgente'].forEach(t=>{c[t]=cards.filter(x=>x.type===t).length;});
    return c;
  },[cards]);

  const filtered = useMemo(()=>cards.filter(c=>{
    if(typeFilter!=='all'&&c.type!==typeFilter)return false;
    if(missionFilter!=='all'&&c.mision!==missionFilter)return false;
    if(c.cost!==undefined&&c.cost!==null&&c.cost>maxCost)return false;
    if(search){const q=search.toLowerCase();if(!(c.name||'').toLowerCase().includes(q)&&!(c.flavorText||'').toLowerCase().includes(q)&&!(c.effects||[]).some(e=>e.description.toLowerCase().includes(q)))return false;}
    return true;
  }),[cards,typeFilter,missionFilter,search,maxCost]);

  const handleSave   = useCallback(updated=>{setCards(p=>p.map(c=>c.id===updated.id?updated:c));setEditCard(null);setSelectedCard(null);},[setCards]);
  const handleCreate = useCallback(newCard=>{setCards(p=>[...p,newCard]);setShowCreate(false);},[setCards]);

  // ── Card set helpers ──
  const buildJsonFromCards = useCallback(c=>({
    clients:       c.filter(x=>x.type==='cliente'),
    talents:       c.filter(x=>x.type==='talento'),
    investments:   c.filter(x=>x.type==='inversion'),
    strategies:    c.filter(x=>x.type==='estrategia'),
    urgent_actions:c.filter(x=>x.type==='accion_urgente'),
  }),[]);

  const buildCardsFromJson = useCallback(data=>[
    ...(data.clients||[]).map(c=>({...c,type:'cliente'})),
    ...(data.talents||[]),
    ...(data.investments||[]).map(c=>({...c,type:'inversion'})),
    ...(data.strategies||[]).map(c=>({...c,type:'estrategia'})),
    ...(data.urgent_actions||[]).map(c=>({...c,type:'accion_urgente'})),
  ],[]);

  const handleNewSet = useCallback(()=>{
    const name = newSetName.trim() || `Set ${sets.length+1}`;
    const newIdx = sets.length;
    setSets(prev=>[...prev,{name,cards:[]}]);
    setActiveSetIdx(newIdx);
    setNewSetName('');
  },[newSetName, sets.length]);

  const handleLoadFile = useCallback(e=>{
    const file = e.target.files[0];
    if(!file) return;
    const newIdx = sets.length;
    const reader = new FileReader();
    reader.onload = ev=>{
      try {
        const data = JSON.parse(ev.target.result);
        const newCards = buildCardsFromJson(data);
        const name = file.name.replace(/\.json$/i,'');
        setSets(prev=>[...prev,{name,cards:newCards}]);
        setActiveSetIdx(newIdx);
      } catch(err){ alert('Error al cargar: '+err.message); }
    };
    reader.readAsText(file);
    e.target.value='';
  },[sets.length, buildCardsFromJson]);

  const handleDownloadSet = useCallback(()=>{
    const data = buildJsonFromCards(cards);
    const name = sets[activeSetIdx]?.name ?? 'cards';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
    a.download = `${name.replace(/\s+/g,'_')}.json`;
    a.click();
  },[cards, sets, activeSetIdx, buildJsonFromCards]);

  const handleDeleteSet = useCallback(idx=>{
    if(sets.length<=1) return;
    setSets(prev=>prev.filter((_,i)=>i!==idx));
    setActiveSetIdx(prev=>Math.min(prev, sets.length-2));
  },[sets.length]);

  const handleExportCSV = useCallback(()=>{
    // helpers
    const encodeRes = reqs => {
      if (!reqs||!reqs.length) return '';
      return reqs.flatMap(r=>Array(Math.max(1,r.qty||1)).fill(RESOURCE_INITIALS[r.type]||r.type[0].toUpperCase())).join('');
    };
    const cell = val => {
      if (val===null||val===undefined) return '';
      if (val===true) return 'SI';
      if (val===false) return '';
      const s=String(val);
      return /[,"\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
    };
    const headers=['id','tipo','nombre','mision','costo','costo_recurrente','cultura_requerida','recursos_producidos',
      'nivel1_recursos','nivel1_fee','nivel1_cultura_req',
      'nivel2_recursos','nivel2_fee','nivel2_cultura_req',
      'nivel3_recursos','nivel3_fee','nivel3_cultura_req',
      'persistente','color_fondo','efectos','flavor_text','descripcion_arte','tiene_imagen'];
    const rows=cards.map(c=>{
      const lv=n=>(c.levels||[]).find(l=>l.level===n)||{};
      return [
        c.id, c.type, c.name, c.mision??'',  // use ?? so null→'' but ''→''
        c.cost??'', c.recurringCost??'', c.cultureRequirement??'',
        encodeRes(c.resources),
        encodeRes(lv(1).requirements), lv(1).fee??'', lv(1).cultureRequirement??'',
        encodeRes(lv(2).requirements), lv(2).fee??'', lv(2).cultureRequirement??'',
        encodeRes(lv(3).requirements), lv(3).fee??'', lv(3).cultureRequirement??'',
        c.persistent||'',
        c.bgColor||'',
        (c.effects||[]).map(e=>e.description).filter(Boolean).join(' | '),
        c.flavorText||'', c.artDescription||'',
        c.artImage?'SI':'NO',
      ].map(cell).join(',');
    });
    const csv=[headers.join(','),...rows].join('\n');
    const name=sets[activeSetIdx]?.name||'cards';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
    a.download=`${name.replace(/\s+/g,'_')}.csv`;
    a.click();
  },[cards, sets, activeSetIdx]);

  const handleImportCSV = useCallback(e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const rows = parseCSV(ev.target.result);
        if (rows.length < 2) { alert('El CSV está vacío o no tiene datos.'); return; }
        const headers = rows[0].map(h => h.trim().toLowerCase());
        const tipoIdx = headers.indexOf('tipo');
        if (tipoIdx < 0) { alert('El CSV no tiene columna "tipo". ¿Es el formato correcto?'); return; }
        const VALID_TYPES = new Set(['talento','cliente','inversion','estrategia','accion_urgente']);
        const imported = rows.slice(1)
          .filter(row => VALID_TYPES.has((row[tipoIdx]||'').trim().toLowerCase()))
          .map(row => csvRowToCard(headers, row));
        if (imported.length === 0) { alert('No se encontraron cartas válidas en el CSV.'); return; }
        // Warn if any talent has no resources (likely a hybrid whose H was not encoded)
        const noResTalents = imported.filter(c => c.type === 'talento' && (!c.resources || c.resources.length === 0));
        setCards(prev => [...prev, ...imported]);
        let msg = `✅ ${imported.length} carta${imported.length!==1?'s':''} importada${imported.length!==1?'s':''} al set "${sets[activeSetIdx]?.name}".`;
        if (noResTalents.length > 0) msg += `\n\n⚠️ ${noResTalents.length} talento${noResTalents.length>1?'s':''} importado${noResTalents.length>1?'s':''} sin recursos (${noResTalents.map(c=>c.name).join(', ')}). Edítalos para añadir sus recursos.`;
        alert(msg);
      } catch(err) {
        alert('Error al parsear el CSV: ' + err.message);
      }
    };
    reader.readAsText(file, 'utf-8');
    e.target.value = '';
  }, [sets, activeSetIdx, setCards]);

  const typeOrder = ['all','talento','cliente','inversion','estrategia','accion_urgente'];

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div className="sidebar">
        <div className="app-logo">The <span>Agency</span> Game</div>
        <div style={{fontSize:11,color:'#475569',marginTop:2}}>Card Viewer v0.3</div>

        {/* ── Card Sets ── */}
        <div className="sidebar-title">Card Sets</div>
        <div className="set-list">
          {sets.map((s,i)=>(
            <button key={i} className={`set-item ${i===activeSetIdx?'active':''}`} onClick={()=>setActiveSetIdx(i)}>
              <span style={{width:6,height:6,borderRadius:'50%',background:i===activeSetIdx?'#6366f1':'#2d3347',flexShrink:0,display:'inline-block'}}/>
              <span style={{flex:1,textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</span>
              <span style={{fontSize:10,color:'#475569',flexShrink:0}}>{s.cards.length}c</span>
              {sets.length>1&&<span
                onClick={e=>{e.stopPropagation();handleDeleteSet(i);}}
                style={{fontSize:10,color:'#475569',cursor:'pointer',padding:'0 2px',flexShrink:0}}
                title="Eliminar set">✕</span>}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:4,marginBottom:4}}>
          <input
            value={newSetName}
            onChange={e=>setNewSetName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleNewSet()}
            placeholder="Nombre..."
            style={{flex:1,background:'#1e2130',border:'1px solid #2d3347',borderRadius:6,padding:'5px 8px',fontSize:11,color:'#e2e8f0',minWidth:0,outline:'none'}}
          />
          <button className="btn btn-primary" style={{padding:'5px 10px',fontSize:11,flexShrink:0}} onClick={handleNewSet}>+ Nuevo</button>
        </div>
        <button className="btn btn-secondary" style={{width:'100%',marginBottom:4,fontSize:12}} onClick={()=>loadInputRef.current?.click()}>
          📂 Cargar desde JSON
        </button>
        <input ref={loadInputRef} type="file" accept=".json" style={{display:'none'}} onChange={handleLoadFile}/>

        {/* ── Tipo ── */}
        <div className="sidebar-title">Tipo</div>
        {typeOrder.map(t=>{
          const cfg=TYPE_CONFIG[t];
          return (
            <button key={t} className={`filter-btn ${typeFilter===t?'active':''}`} onClick={()=>setTypeFilter(t)}>
              {t==='all'?'🃏':cfg.icon} {t==='all'?'Todas las cartas':cfg.label}
              <span className="filter-count">{typeCounts[t]||0}</span>
            </button>
          );
        })}

        {/* ── Misión ── */}
        <div className="sidebar-title">Misión</div>
        <button className={`filter-btn ${missionFilter==='all'?'active':''}`} onClick={()=>setMissionFilter('all')}>
          🌐 Todas <span className="filter-count">{cards.filter(c=>c.mision).length}</span>
        </button>
        {MISSIONS.map(m=>(
          <button key={m} className={`filter-btn ${missionFilter===m?'active':''}`} onClick={()=>setMissionFilter(m)}>
            {MISSION_EMOJI[m]} {m.charAt(0).toUpperCase()+m.slice(1)}
            <span className="filter-count">{cards.filter(c=>c.mision===m).length}</span>
          </button>
        ))}

        {/* ── Costo ── */}
        <div className="sidebar-title">Costo máximo</div>
        <div style={{padding:'0 4px'}}>
          <input type="range" className="range-slider" min={0} max={20} value={maxCost} onChange={e=>setMaxCost(Number(e.target.value))} style={{width:'100%'}}/>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#64748b',marginTop:3}}>
            <span>0K</span><span style={{color:'#f1f5f9',fontWeight:600}}>{maxCost}K</span><span>20K</span>
          </div>
        </div>

        {/* ── Leyenda ── */}
        <div className="sidebar-title">Leyenda de recursos</div>
        {Object.entries(RESOURCE_LABELS).map(([type,label])=>(
          <div key={type} className="res-legend">
            <ResourceIconSVG type={type} size={20}/>
            <span className="res-name" style={{color:RESOURCE_COLORS[type]}}>{label}</span>
          </div>
        ))}

        <div style={{marginTop:'auto',paddingTop:20,display:'flex',flexDirection:'column',gap:6}}>
          <button className="btn btn-secondary" style={{width:'100%'}} onClick={handleDownloadSet}>
            ⬇️ Guardar "{sets[activeSetIdx]?.name}"
          </button>
          <div style={{display:'flex',gap:4}}>
            <button className="btn btn-secondary" style={{flex:1}} onClick={handleExportCSV}>
              📊 Exportar CSV
            </button>
            <button className="btn btn-secondary" style={{flex:1}} onClick={()=>importCsvRef.current?.click()}>
              📥 Importar CSV
            </button>
          </div>
          <input ref={importCsvRef} type="file" accept=".csv,text/csv" style={{display:'none'}} onChange={handleImportCSV}/>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <input className="search-input" placeholder="🔍  Buscar por nombre, efecto o flavor text..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:400}}/>
          <div style={{fontSize:13,color:'#64748b',marginLeft:'auto'}}>{filtered.length} carta{filtered.length!==1?'s':''} encontrada{filtered.length!==1?'s':''}</div>
          <button className="btn btn-primary" style={{flexShrink:0,padding:'7px 14px',fontSize:13}} onClick={()=>setShowCreate(true)}>✨ Nueva carta</button>
        </div>
        {filtered.length===0
          ?<div className="empty-state"><div className="empty-icon">🔍</div><div>No hay cartas que coincidan</div></div>
          :<div className="card-grid">{filtered.map(c=><CardItem key={c.id} card={c} onClick={setSelectedCard}/>)}</div>
        }
      </div>

      {selectedCard&&!editCard&&<CardDetailModal card={selectedCard} onClose={()=>setSelectedCard(null)} onEdit={c=>setEditCard(c)}/>}
      {editCard&&<EditModal card={editCard} onClose={()=>setEditCard(null)} onSave={handleSave}/>}
      {showCreate&&<CreateCardModal onClose={()=>setShowCreate(false)} onCreate={handleCreate}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Agency Game — Card Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1d27; }
    ::-webkit-scrollbar-thumb { background: #3a3f55; border-radius: 3px; }
    /* ── Card type border colors ── */
    .card-talento    { border-color: #9490cc; }
    .card-cliente    { border-color: #7aaa90; }
    .card-inversion  { border-color: #c4a060; }
    .card-estrategia { border-color: #9a80b8; }
    .card-urgente    { border-color: #cc7070; }
    /* ── Badge styles (used in modals) ── */
    .badge { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .badge-talento    { background:#312e81; color:#a5b4fc; }
    .badge-cliente    { background:#064e3b; color:#6ee7b7; }
    .badge-inversion  { background:#451a03; color:#fcd34d; }
    .badge-estrategia { background:#3b0764; color:#d8b4fe; }
    .badge-urgente    { background:#450a0a; color:#fca5a5; }
    .mission-arte          { background:#4c1d95; color:#c4b5fd; }
    .mission-deporte       { background:#431407; color:#fed7aa; }
    .mission-entretenimiento { background:#3f3401; color:#fef08a; }
    .mission-finanzas      { background:#052e16; color:#86efac; }
    .mission-gastronomia   { background:#1a2e05; color:#bef264; }
    .mission-naturaleza    { background:#042f2e; color:#99f6e4; }
    .mission-retail        { background:#082f49; color:#7dd3fc; }
    .mission-tecnologia    { background:#172554; color:#93c5fd; }
    .mission-viajes        { background:#1e1b4b; color:#c7d2fe; }
    .resource-group { display:inline-flex; align-items:center; gap:2px; margin:2px 3px 2px 0; }
    .resource-qty { font-size:11px; font-weight:700; color:#f1f5f9; line-height:1; }
    .flex-badge { font-size:9px; font-weight:800; color:#94a3b8; background:#1e2130; border-radius:999px; padding:1px 4px; border:1px dashed #3a3f55; margin-left:1px; }
    /* ── Card grid + card items ── */
    .card-grid { display:flex; flex-wrap:wrap; gap:16px; padding:20px; align-items:flex-start; }
    .card-item { border:1.5px solid; border-radius:10px; padding:0; cursor:pointer; transition:transform .15s, box-shadow .15s; position:relative; overflow:hidden; flex-shrink:0; background:#eeeae4; }
    .card-item:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,.22); }
    .card-portrait  { width:220px; height:308px; }
    .card-landscape { width:390px; height:272px; }
    /* ── Card internal shared ── */
    .card-art { background:#C2AA88; }
    .card-divider { border:none; border-top:1px solid #ccc7be; margin:0; }
    /* ── Mission backgrounds (client cards) ── */
    .mission-bg-arte            { background:#ede8f2; border-color:#b8a8d0 !important; }
    .mission-bg-deporte         { background:#e6eef5; border-color:#90aac4 !important; }
    .mission-bg-entretenimiento { background:#f5ede8; border-color:#c8a890 !important; }
    .mission-bg-finanzas        { background:#e6ede4; border-color:#90aa88 !important; }
    .mission-bg-gastronomia     { background:#f5ede0; border-color:#c8a870 !important; }
    .mission-bg-naturaleza      { background:#e8f0e8; border-color:#88aa88 !important; }
    .mission-bg-retail          { background:#ede8f0; border-color:#b0a0c8 !important; }
    .mission-bg-tecnologia      { background:#e4eaf5; border-color:#8898c8 !important; }
    .mission-bg-viajes          { background:#e6f4f0; border-color:#78aaa0 !important; }
    /* ── Legacy card text styles (kept for modal) ── */
    .card-name { font-weight:700; font-size:14px; margin-bottom:6px; line-height:1.3; }
    .card-meta { display:flex; flex-wrap:wrap; gap:4px; margin:6px 0; }
    .card-cost { font-size:13px; font-weight:700; color:#fbbf24; white-space:nowrap; }
    .card-flavor { font-style:italic; font-size:11px; color:#94a3b8; margin-top:8px; line-height:1.4; border-top:1px solid rgba(255,255,255,.07); padding-top:7px; }
    .card-effect-preview { font-size:11px; color:#cbd5e1; margin-top:6px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .sidebar { width:230px; min-width:230px; background:#13161f; border-right:1px solid #1e2130; padding:16px; height:100vh; overflow-y:auto; position:sticky; top:0; display:flex; flex-direction:column; }
    .sidebar-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#64748b; margin:16px 0 8px; }
    .filter-btn { width:100%; text-align:left; padding:8px 10px; border-radius:7px; border:none; background:transparent; color:#94a3b8; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:8px; transition:background .1s; }
    .filter-btn:hover { background:#1e2130; }
    .filter-btn.active { background:#1e2130; color:#f1f5f9; font-weight:600; }
    .filter-count { margin-left:auto; font-size:11px; background:#252a3a; color:#64748b; padding:1px 6px; border-radius:999px; }
    .search-input { width:100%; background:#1e2130; border:1px solid #2d3347; border-radius:8px; padding:9px 12px; color:#f1f5f9; font-size:13px; outline:none; }
    .search-input:focus { border-color:#6366f1; }
    .main { flex:1; overflow-y:auto; }
    .topbar { background:#13161f; border-bottom:1px solid #1e2130; padding:12px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }
    .modal { background:#13161f; border-radius:16px; max-width:520px; width:100%; max-height:90vh; overflow-y:auto; border:1px solid #2d3347; }
    .modal-header { padding:20px 24px 16px; border-bottom:1px solid #1e2130; }
    .modal-body { padding:20px 24px; }
    .modal-field { margin-bottom:14px; }
    .modal-label { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:#64748b; font-weight:600; margin-bottom:5px; }
    .modal-value { font-size:14px; color:#e2e8f0; line-height:1.5; }
    .modal-effect { background:#0f1117; border-radius:8px; padding:12px; border-left:3px solid #6366f1; margin-bottom:8px; }
    .modal-effect-desc { font-size:13px; color:#e2e8f0; line-height:1.5; }
    .modal-effect-meta { font-size:11px; color:#64748b; margin-top:4px; }
    .resource-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #1e2130; }
    .resource-row:last-child { border-bottom:none; }
    .resource-label { font-size:13px; color:#cbd5e1; font-weight:500; min-width:90px; }
    .level-card { background:#0f1117; border-radius:10px; padding:14px; margin-bottom:10px; border:1px solid #1e2130; }
    .level-header { font-size:13px; font-weight:700; color:#f1f5f9; margin-bottom:8px; }
    .edit-input { width:100%; background:#0f1117; border:1px solid #2d3347; border-radius:7px; padding:8px 10px; color:#f1f5f9; font-size:13px; outline:none; margin-top:4px; }
    .edit-input:focus { border-color:#6366f1; }
    .edit-textarea { width:100%; background:#0f1117; border:1px solid #2d3347; border-radius:7px; padding:8px 10px; color:#f1f5f9; font-size:13px; outline:none; margin-top:4px; min-height:80px; resize:vertical; }
    .btn { padding:9px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:opacity .15s; }
    .btn-primary { background:#6366f1; color:white; }
    .btn-secondary { background:#1e2130; color:#94a3b8; border:1px solid #2d3347; }
    .btn:hover { opacity:.85; }
    .set-item { width:100%; text-align:left; padding:5px 8px; border-radius:6px; border:none; background:transparent; color:#94a3b8; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:6px; transition:background .1s; }
    .set-item:hover { background:#1e2130; }
    .set-item.active { background:#1a2040; color:#f1f5f9; font-weight:600; }
    .set-list { max-height:100px; overflow-y:auto; margin-bottom:8px; }
    .stat-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #1e2130; font-size:13px; }
    .stat-row:last-child { border-bottom:none; }
    .stat-label { color:#64748b; }
    .stat-value { color:#f1f5f9; font-weight:500; }
    .tag-persistent { display:inline-flex; align-items:center; gap:4px; background:#3b0764; color:#d8b4fe; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; text-transform:uppercase; letter-spacing:.5px; }
    .tag-recurring { display:inline-flex; align-items:center; gap:4px; background:#451a03; color:#fbbf24; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
    .counter-chip { background:#1e2130; border-radius:6px; padding:4px 10px; font-size:12px; color:#94a3b8; }
    .range-slider { width:100%; accent-color:#6366f1; }
    .app-logo { font-size:15px; font-weight:900; letter-spacing:-0.5px; }
    .app-logo span { color:#6366f1; }
    .empty-state { padding:60px; text-align:center; color:#475569; }
    .empty-icon { font-size:48px; margin-bottom:12px; }
    .res-legend { display:flex; align-items:center; gap:7px; padding:5px 0; font-size:12px; color:#94a3b8; }
    .res-name { font-weight:500; }
    select.edit-input { appearance:none; }
    [draggable="true"] { touch-action: none; -webkit-user-select: none; user-select: none; }
  </style>
</head>

<script>
/* ── Immediate touch-to-drag for mobile/iPad ── */
(function () {
  var dragging = false, dragSrc = null, ghost = null, lastOver = null;
  var offX = 0, offY = 0;

  function makeGhost(src, tx, ty) {
    var r = src.getBoundingClientRect();
    offX = tx - r.left;
    offY = ty - r.top;
    var g = src.cloneNode(true);
    g.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;opacity:0.85;'
      + 'margin:0;transition:none;transform:scale(1.05);'
      + 'width:' + r.width + 'px;height:' + r.height + 'px;'
      + 'left:' + r.left + 'px;top:' + r.top + 'px;';
    document.body.appendChild(g);
    return g;
  }

  function fire(el, type, cx, cy) {
    try { el.dispatchEvent(new DragEvent(type, { bubbles: true, cancelable: true, clientX: cx||0, clientY: cy||0 })); }
    catch(e) {
      var ev = document.createEvent('Event');
      ev.initEvent(type, true, true);
      el.dispatchEvent(ev);
    }
  }

  function elAt(x, y) {
    if (ghost) ghost.style.visibility = 'hidden';
    var el = document.elementFromPoint(x, y);
    if (ghost) ghost.style.visibility = '';
    return el;
  }

  document.addEventListener('touchstart', function (e) {
    var src = e.target.closest('[draggable="true"]');
    if (!src) return;
    e.preventDefault();
    var t = e.touches[0];
    dragging = true; dragSrc = src;
    ghost = makeGhost(src, t.clientX, t.clientY);
    fire(src, 'dragstart', t.clientX, t.clientY);
  }, { passive: false });

  document.addEventListener('touchmove', function (e) {
    if (!dragging) return;
    e.preventDefault();
    var t = e.touches[0];
    ghost.style.left = (t.clientX - offX) + 'px';
    ghost.style.top  = (t.clientY - offY) + 'px';
    var el = elAt(t.clientX, t.clientY);
    if (el !== lastOver) {
      if (lastOver) fire(lastOver, 'dragleave', t.clientX, t.clientY);
      lastOver = el;
    }
    if (el) fire(el, 'dragover', t.clientX, t.clientY);
  }, { passive: false });

  document.addEventListener('touchend', function (e) {
    if (!dragging) return;
    var t = e.changedTouches[0];
    var el = elAt(t.clientX, t.clientY);
    if (el) fire(el, 'drop', t.clientX, t.clientY);
    fire(dragSrc, 'dragend', t.clientX, t.clientY);
    ghost.remove();
    ghost = null; dragging = false; dragSrc = null; lastOver = null;
  }, { passive: false });

  document.addEventListener('touchcancel', function () {
    if (!dragging) return;
    fire(dragSrc, 'dragend');
    if (ghost) ghost.remove();
    ghost = null; dragging = false; dragSrc = null; lastOver = null;
  });
})();
</script>

const DEFAULT_MISSION_COLORS = {

  finanzas:'#9D846B', gastronomia:'#F15F02', naturaleza:'#43E95A',

function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function rgbToHex(r,g,b) {
  return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');
}
function darkenHex(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return rgbToHex(r*(1-amt), g*(1-amt), b*(1-amt));
}
function lightenHex(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return rgbToHex(r+(255-r)*amt, g+(255-g)*amt, b+(255-b)*amt);
}

function applyMissionColors(colors) {
  MISSIONS.forEach(m => {
    const main = colors[m] || DEFAULT_MISSION_COLORS[m];
    MISSION_COLOR_MAP[m]    = main;
    MISSION_STRIP_COLORS[m] = darkenHex(main, 0.25);
    MISSION_BG_MAP[m]       = lightenHex(main, 0.87);
  });
  // Patch CSS .mission-bg-* classes
  let tag = document.getElementById('mission-dynamic-css');
  if (!tag) { tag = document.createElement('style'); tag.id = 'mission-dynamic-css'; document.head.appendChild(tag); }
  tag.textContent = MISSIONS.map(m =>
    `.mission-bg-${m}{background:${MISSION_BG_MAP[m]}!important;border-color:${MISSION_STRIP_COLORS[m]}!important;}`
  ).join('');
}

function missionBarTextColor(hex) {
  if (!hex) return '#111';
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) > 145 ? '#111111' : '#ffffff';
}

// ─── CSV IMPORT HELPERS ───────────────────────────────────────────────────────

function parseCSV(text) {
  // Strip UTF-8 BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  // Split into lines respecting quoted newlines
  const lines = [];
  let cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === '\r') {
      // skip carriage returns
    } else if (c === '\n' && !inQ) {
      lines.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  if (cur) lines.push(cur);
  // Parse each line into fields
  return lines.filter(l => l.trim()).map(line => {
    const fields = []; let f = '', q = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (q && line[i+1] === '"') { f += '"'; i++; }
        else q = !q;
      } else if (c === ',' && !q) { fields.push(f); f = ''; }
      else f += c;
    }
    fields.push(f);
    return fields;
  });
}

function decodeResources(str) {
  if (!str || !str.trim()) return [];
  const INITIAL_TO_TYPE = { C:'creativo', D:'desarrollo', A:'analista', M:'manager', H:'hibrido' };
  const counts = {};
  for (const ch of str.toUpperCase()) {
    if (INITIAL_TO_TYPE[ch]) counts[ch] = (counts[ch]||0) + 1;
  }
  return Object.entries(counts).map(([k, qty]) => ({ type: INITIAL_TO_TYPE[k], qty }));
}

function csvRowToCard(headers, row) {
  const get = col => { const i = headers.indexOf(col); return i >= 0 ? (row[i]||'') : ''; };
  const num = col => { const v = get(col); return v !== '' ? Number(v) : null; };
  const tipo = get('tipo');
  const id = get('id') || `${tipo}-${Date.now()}-${Math.floor(Math.random()*9999)}`;
  const effects = () => get('efectos') ? get('efectos').split(' | ').filter(Boolean).map(d=>({description:d})) : [];
  const base = { id, type:tipo, name:get('nombre'), flavorText:get('flavor_text'), artDescription:get('descripcion_arte'), artImage:null };

  if (tipo === 'talento') return {
    ...base, mision: get('mision') || null,  // preserve null for hybrid (no mission)
    cost: num('costo')??0, recurringCost: num('costo_recurrente'),
    cultureRequirement:num('cultura_requerida'),
    resources: decodeResources(get('recursos_producidos')),
    effects: effects(),
  };
  if (tipo === 'cliente') {
    const levels = [];
    for (let n = 1; n <= 3; n++) {
      const reqs = decodeResources(get(`nivel${n}_recursos`));
      const fee = get(`nivel${n}_fee`);
      if (reqs.length > 0 || fee !== '') levels.push({
        level: n, requirements: reqs,
        fee: fee !== '' ? Number(fee) : 0,
        cultureRequirement: num(`nivel${n}_cultura_req`),
      });
    }
    return { ...base, mision:get('mision'), effects:[], levels };
  }
  if (tipo === 'inversion') return {
    ...base, cost:num('costo')??0, recurringCost:num('costo_recurrente'),
    bgColor:get('color_fondo')||'#2D4A3E', effects:effects(),
  };
  if (tipo === 'estrategia') return {
    ...base, cost:num('costo')??0, persistent:get('persistente')==='SI',
    bgColor:get('color_fondo')||'#2D2040', effects:effects(),
  };
  if (tipo === 'accion_urgente') return {
    ...base, cost:num('costo')??0,
    bgColor:get('color_fondo')||'#3D1515', effects:effects(),
  };
  return base;
}

function defaultForType(type) {
  const base = { name:'Nueva carta', cost:3, flavorText:'', artDescription:'', effects:[{description:''}], artImage:null };
  if (type==='talento')       return {...base, mision:'arte', recurringCost:null, cultureRequirement:null, resources:[{type:'creativo',qty:1}]};
  if (type==='cliente')       return { name:'Nuevo cliente', mision:'arte', flavorText:'', artDescription:'', artImage:null, effects:[], levels:[{level:1, requirements:[{type:'creativo',qty:1}], fee:3, cultureRequirement:null}] };
  if (type==='inversion')     return {...base, recurringCost:null, bgColor:'#2D4A3E'};
  if (type==='estrategia')    return {...base, persistent:false, bgColor:'#2D2040'};
  if (type==='accion_urgente')return {...base, bgColor:'#3D1515'};
  return base;
}

  // ── Resources (talento) ──
  const addResource    = () => upd('resources', [...(draft.resources||[]), {type:'creativo', qty:1}]);
  const removeResource = i  => upd('resources', draft.resources.filter((_,j)=>j!==i));
  const updResource    = (i,k,v) => { const r=[...draft.resources]; r[i]={...r[i],[k]:v}; upd('resources',r); };

  // ── Effects ──
  const addEffect    = () => upd('effects', [...(draft.effects||[]), {description:''}]);
  const removeEffect = i  => upd('effects', draft.effects.filter((_,j)=>j!==i));
  const updEffect    = (i,v) => { const e=[...draft.effects]; e[i]={...e[i],description:v}; upd('effects',e); };

  // ── Client levels ──
  const addLevel    = () => upd('levels', [...(draft.levels||[]), {level:(draft.levels||[]).length+1, requirements:[{type:'creativo',qty:1}], fee:3, cultureRequirement:null}]);
  const removeLevel = i  => upd('levels', draft.levels.filter((_,j)=>j!==i));
  const updLevel    = (i,k,v) => { const l=[...draft.levels]; l[i]={...l[i],[k]:v}; upd('levels',l); };
  const addLevelReq    = i => { const l=[...draft.levels]; l[i]={...l[i],requirements:[...(l[i].requirements||[]),{type:'creativo',qty:1}]}; upd('levels',l); };

  const updLevelReq    = (i,j,k,v) => { const l=[...draft.levels]; const r=[...l[i].requirements]; r[j]={...r[j],[k]:v}; l[i]={...l[i],requirements:r}; upd('levels',l); };

  const TYPE_LABELS = {talento:'Talento',cliente:'Cliente',inversion:'Inversión',estrategia:'Estrategia',accion_urgente:'Acción Urgente'};
  const inputStyle = {background:'#0f1117', border:'1px solid #2d3347', borderRadius:6, padding:'6px 10px', fontSize:12, color:'#e2e8f0', width:'100%', outline:'none', boxSizing:'border-box'};
  const labelStyle = {fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:.5, color:'#64748b', marginBottom:4, display:'block'};

  return (

              <span style={{fontSize:11, background:'#1e2130', border:'1px solid #2d3347', borderRadius:20, padding:'3px 10px', color:'#94a3b8', fontWeight:600}}>

              <div style={sectionStyle}>
                <label style={labelStyle}>Color de fondo</label>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input type="color" value={draft.bgColor||'#2D2040'} onChange={e=>upd('bgColor',e.target.value)}
                    style={{width:40,height:32,border:'1px solid #2d3347',borderRadius:6,background:'transparent',cursor:'pointer',padding:2}}/>
                  <input style={{...inputStyle,flex:1}} value={draft.bgColor||''} onChange={e=>upd('bgColor',e.target.value)} placeholder="#2D2040"/>
                </div>

            {/* Effects */}
            {cardType!=='cliente' && (

                  <span style={labelStyle}>Efectos</span>

                </div>

                    <textarea style={{...inputStyle,minHeight:60,resize:'vertical'}} value={eff.description||''} onChange={e=>updEffect(i,e.target.value)} placeholder="Descripción del efecto..."/>
                    {(draft.effects||[]).length>1&&<button onClick={()=>removeEffect(i)} style={{position:'absolute',top:4,right:6,background:'transparent',border:'none',color:'#475569',cursor:'pointer',fontSize:12}}>✕</button>}

            <div style={sectionStyle}>
              <label style={labelStyle}>Flavor text</label>
              <textarea style={{...inputStyle,minHeight:56,resize:'vertical'}} value={draft.flavorText||''} onChange={e=>upd('flavorText',e.target.value)} placeholder="Texto de sabor..."/>
            </div>

            {/* Art description */}
            <div style={sectionStyle}>
              <label style={labelStyle}>Descripción de arte</label>
              <textarea style={{...inputStyle,minHeight:56,resize:'vertical'}} value={draft.artDescription||''} onChange={e=>upd('artDescription',e.target.value)} placeholder="Para el ilustrador..."/>
            </div>

            {/* Background image */}
            <div style={sectionStyle}>
              <label style={labelStyle}>Imagen de fondo</label>
              {draft.artImage && (
                <div style={{position:'relative',marginBottom:8}}>
                  <img src={draft.artImage} style={{width:'100%',height:80,objectFit:'cover',borderRadius:6,border:'1px solid #2d3347'}} alt="preview"/>
                  <button onClick={()=>upd('artImage',null)} style={{position:'absolute',top:4,right:4,background:'rgba(0,0,0,0.7)',border:'none',color:'white',borderRadius:4,padding:'2px 6px',cursor:'pointer',fontSize:11}}>✕ Quitar</button>
                </div>
              )}

              </button>
              <input ref={imgRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImageUpload}/>

            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn btn-primary" style={{flex:1}} onClick={()=>onSave(draft)}>💾 Guardar cambios</button>
              <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
            </div>
          </div>

          {/* ── Right: live preview ── */}
          <div style={{width:260, flexShrink:0, background:'#0c0e16', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, gap:16}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:'#475569'}}>Vista previa</div>
            <div style={{width:220, height:308, borderRadius:10, overflow:'hidden', border:'1.5px solid #2d3347', boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
              {cardType==='talento'        && <CardTalento card={draft}/>}
              {cardType==='cliente'        && <CardCliente card={draft}/>}
              {cardType==='inversion'      && <CardInversion card={draft}/>}
              {cardType==='estrategia'     && <CardEstrategia card={draft}/>}
              {cardType==='accion_urgente' && <CardUrgente card={draft}/>}

        </div>

    </div>
  );
}


// ─── MISSION COLOR EDITOR ────────────────────────────────────────────────────
function MissionColorEditor({ colors, onChange, onClose }) {
  const [local, setLocal] = React.useState({...colors});
  const upd = (m, v) => {
    const next = {...local, [m]: v};
    setLocal(next);
    onChange(next); // live preview
  };
  const restore = () => {
    setLocal({...DEFAULT_MISSION_COLORS});
    onChange({...DEFAULT_MISSION_COLORS});
  };
  const inputStyle = {
    width:80, background:'#1e2130', border:'1px solid #2d3347',
    borderRadius:6, padding:'4px 8px', color:'#f1f5f9',
    fontSize:12, fontFamily:'monospace', outline:'none',
  };
  return (
    <div
      style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.72)', display:'flex',
               alignItems:'center', justifyContent:'center', zIndex:600 }}
      onClick={onClose}
    >
      <div
        style={{ background:'#13161f', border:'1px solid #2d3347', borderRadius:14,
                 padding:'20px 22px', minWidth:360, maxHeight:'90vh', overflowY:'auto' }}
        onClick={e => e.stopPropagation()}
      >
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18 }}>
          <span style={{ fontSize:16, fontWeight:700, color:'#f1f5f9' }}>🎨 Colores de Misión</span>
          <button onClick={onClose}
            style={{ background:'#1e2130', border:'1px solid #2d3347', borderRadius:6,
                     color:'#94a3b8', cursor:'pointer', fontSize:13, padding:'4px 10px' }}>✕</button>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {MISSIONS.map(m => {
            const main  = local[m] || DEFAULT_MISSION_COLORS[m];
            const strip = darkenHex(main, 0.25);
            const bg    = lightenHex(main, 0.87);
            return (
              <div key={m} style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:17, width:22 }}>{MISSION_EMOJI[m]}</span>
                <span style={{ flex:1, fontSize:13, color:'#94a3b8', textTransform:'capitalize' }}>{m}</span>
                <div title="Fondo" style={{ width:18, height:24, borderRadius:4, background:bg,    border:'1px solid #3a3f55', flexShrink:0 }}/>
                <div title="Strip" style={{ width:18, height:24, borderRadius:4, background:strip, border:'1px solid #3a3f55', flexShrink:0 }}/>
                <input type="color" value={main} onChange={e => upd(m, e.target.value)}
                  style={{ width:32, height:28, border:'none', borderRadius:6, cursor:'pointer',
                           background:'transparent', padding:0, flexShrink:0 }}/>
                <input type="text" value={main}
                  onChange={e => { if (/^#[0-9a-fA-F]{0,6}$/.test(e.target.value)) upd(m, e.target.value); }}
                  style={inputStyle}/>
              </div>
            );
          })}
        </div>
        <div style={{ fontSize:10, color:'#3a4060', marginTop:10 }}>
          Los dos cuadrados muestran el fondo y strip derivados automáticamente.
        </div>
        <div style={{ display:'flex', gap:8, marginTop:16 }}>
          <button onClick={restore}
            style={{ flex:1, padding:'7px 0', borderRadius:7, border:'1px solid #2d3347',
                     background:'transparent', color:'#94a3b8', cursor:'pointer', fontSize:13 }}>
            ↺ Restaurar defaults
          </button>
          <button onClick={onClose}
            style={{ flex:1, padding:'7px 0', borderRadius:7, border:'none',
                     background:'#6366f1', color:'white', cursor:'pointer', fontSize:13, fontWeight:700 }}>
            ✓ Listo
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  // ── Card Set Management ──
  const defaultCards = useMemo(()=>[
    ...CARDS_DATA.clients.map(c=>({...c,type:'cliente'})),
    ...CARDS_DATA.talents,
    ...CARDS_DATA.investments.map(c=>({...c,type:'inversion'})),
    ...CARDS_DATA.strategies.map(c=>({...c,type:'estrategia'})),
    ...CARDS_DATA.urgent_actions.map(c=>({...c,type:'accion_urgente'})),
  ],[]);

  const [missionColors, setMissionColors] = useState({...DEFAULT_MISSION_COLORS});
  const [showColorEditor, setShowColorEditor] = useState(false);
  React.useEffect(() => { applyMissionColors(missionColors); }, [missionColors]);
  const [sets, setSets]                 = useState([{name:'Default', cards:defaultCards}]);
  const [activeSetIdx, setActiveSetIdx] = useState(0);
  const [newSetName, setNewSetName]     = useState('');
  const loadInputRef  = useRef(null);
  const importCsvRef  = useRef(null);

  const cards = sets[activeSetIdx]?.cards ?? [];
  const setCards = useCallback(updater => {
    setSets(prev => {
      const next = [...prev];
      next[activeSetIdx] = {
        ...next[activeSetIdx],
        cards: typeof updater === 'function' ? updater(next[activeSetIdx].cards) : updater,
      };
      return next;
    });
  }, [activeSetIdx]);

  // ── Filters ──
  const [typeFilter,setTypeFilter]       = useState('all');
  const [missionFilter,setMissionFilter] = useState('all');
  const [search,setSearch]               = useState('');
  const [maxCost,setMaxCost]             = useState(20);
  const [selectedCard,setSelectedCard]   = useState(null);
  const [editCard,setEditCard]           = useState(null);
  const [showCreate,setShowCreate]       = useState(false);

  const typeCounts = useMemo(()=>{
    const c={all:cards.length};
    ['talento','cliente','inversion','estrategia','accion_urgente'].forEach(t=>{c[t]=cards.filter(x=>x.type===t).length;});
    return c;
  },[cards]);

  const filtered = useMemo(()=>cards.filter(c=>{
    if(typeFilter!=='all'&&c.type!==typeFilter)return false;
    if(missionFilter!=='all'&&c.mision!==missionFilter)return false;
    if(c.cost!==undefined&&c.cost!==null&&c.cost>maxCost)return false;
    if(search){const q=search.toLowerCase();if(!(c.name||'').toLowerCase().includes(q)&&!(c.flavorText||'').toLowerCase().includes(q)&&!(c.effects||[]).some(e=>e.description.toLowerCase().includes(q)))return false;}
    return true;
  }),[cards,typeFilter,missionFilter,search,maxCost]);

  const handleSave   = useCallback(updated=>{setCards(p=>p.map(c=>c.id===updated.id?updated:c));setEditCard(null);setSelectedCard(null);},[setCards]);
  const handleCreate = useCallback(newCard=>{setCards(p=>[...p,newCard]);setShowCreate(false);},[setCards]);

  // ── Card set helpers ──
  const buildJsonFromCards = useCallback(c=>({
    clients:       c.filter(x=>x.type==='cliente'),
    talents:       c.filter(x=>x.type==='talento'),
    investments:   c.filter(x=>x.type==='inversion'),
    strategies:    c.filter(x=>x.type==='estrategia'),
    urgent_actions:c.filter(x=>x.type==='accion_urgente'),
    mission_colors: missionColors,
  }),[missionColors]);

  const buildCardsFromJson = useCallback(data=>[
    ...(data.clients||[]).map(c=>({...c,type:'cliente'})),
    ...(data.talents||[]),
    ...(data.investments||[]).map(c=>({...c,type:'inversion'})),
    ...(data.strategies||[]).map(c=>({...c,type:'estrategia'})),
    ...(data.urgent_actions||[]).map(c=>({...c,type:'accion_urgente'})),
  ],[]);

  const handleNewSet = useCallback(()=>{
    const name = newSetName.trim() || `Set ${sets.length+1}`;
    const newIdx = sets.length;
    setSets(prev=>[...prev,{name,cards:[]}]);
    setActiveSetIdx(newIdx);
    setNewSetName('');
  },[newSetName, sets.length]);

  const handleLoadFile = useCallback(e=>{
    const file = e.target.files[0];
    if(!file) return;
    const newIdx = sets.length;
    const reader = new FileReader();
    reader.onload = ev=>{
      try {
        const data = JSON.parse(ev.target.result);
        const newCards = buildCardsFromJson(data);
        const name = file.name.replace(/\.json$/i,'');
        if (data.mission_colors) setMissionColors(prev=>({...prev,...data.mission_colors}));
        setSets(prev=>[...prev,{name,cards:newCards}]);
        setActiveSetIdx(newIdx);
      } catch(err){ alert('Error al cargar: '+err.message); }
    };
    reader.readAsText(file);
    e.target.value='';
  },[sets.length, buildCardsFromJson]);

  const handleDownloadSet = useCallback(()=>{
    const data = buildJsonFromCards(cards);
    const name = sets[activeSetIdx]?.name ?? 'cards';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
    a.download = `${name.replace(/\s+/g,'_')}.json`;
    a.click();
  },[cards, sets, activeSetIdx, buildJsonFromCards]);

  const handleDeleteSet = useCallback(idx=>{
    if(sets.length<=1) return;
    setSets(prev=>prev.filter((_,i)=>i!==idx));
    setActiveSetIdx(prev=>Math.min(prev, sets.length-2));
  },[sets.length]);

  const handleExportCSV = useCallback(()=>{
    // helpers
    const encodeRes = reqs => {
      if (!reqs||!reqs.length) return '';
      return reqs.flatMap(r=>Array(Math.max(1,r.qty||1)).fill(RESOURCE_INITIALS[r.type]||r.type[0].toUpperCase())).join('');
    };
    const cell = val => {
      if (val===null||val===undefined) return '';
      if (val===true) return 'SI';
      if (val===false) return '';
      const s=String(val);
      return /[,"\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
    };
    const headers=['id','tipo','nombre','mision','costo','costo_recurrente','cultura_requerida','recursos_producidos',
      'nivel1_recursos','nivel1_fee','nivel1_cultura_req',
      'nivel2_recursos','nivel2_fee','nivel2_cultura_req',
      'nivel3_recursos','nivel3_fee','nivel3_cultura_req',
      'persistente','color_fondo','efectos','flavor_text','descripcion_arte','tiene_imagen'];
    const rows=cards.map(c=>{
      const lv=n=>(c.levels||[]).find(l=>l.level===n)||{};
      return [
        c.id, c.type, c.name, c.mision??'',  // use ?? so null→'' but ''→''
        c.cost??'', c.recurringCost??'', c.cultureRequirement??'',
        encodeRes(c.resources),
        encodeRes(lv(1).requirements), lv(1).fee??'', lv(1).cultureRequirement??'',
        encodeRes(lv(2).requirements), lv(2).fee??'', lv(2).cultureRequirement??'',
        encodeRes(lv(3).requirements), lv(3).fee??'', lv(3).cultureRequirement??'',
        c.persistent||'',
        c.bgColor||'',
        (c.effects||[]).map(e=>e.description).filter(Boolean).join(' | '),
        c.flavorText||'', c.artDescription||'',
        c.artImage?'SI':'NO',
      ].map(cell).join(',');
    });
    const csv=[headers.join(','),...rows].join('\n');
    const name=sets[activeSetIdx]?.name||'cards';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
    a.download=`${name.replace(/\s+/g,'_')}.csv`;
    a.click();
  },[cards, sets, activeSetIdx]);

  const handleImportCSV = useCallback(e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const rows = parseCSV(ev.target.result);
        if (rows.length < 2) { alert('El CSV está vacío o no tiene datos.'); return; }
        const headers = rows[0].map(h => h.trim().toLowerCase());
        const tipoIdx = headers.indexOf('tipo');
        if (tipoIdx < 0) { alert('El CSV no tiene columna "tipo". ¿Es el formato correcto?'); return; }
        const VALID_TYPES = new Set(['talento','cliente','inversion','estrategia','accion_urgente']);
        const imported = rows.slice(1)
          .filter(row => VALID_TYPES.has((row[tipoIdx]||'').trim().toLowerCase()))
          .map(row => csvRowToCard(headers, row));
        if (imported.length === 0) { alert('No se encontraron cartas válidas en el CSV.'); return; }
        // Warn if any talent has no resources (likely a hybrid whose H was not encoded)
        const noResTalents = imported.filter(c => c.type === 'talento' && (!c.resources || c.resources.length === 0));
        setCards(prev => [...prev, ...imported]);
        let msg = `✅ ${imported.length} carta${imported.length!==1?'s':''} importada${imported.length!==1?'s':''} al set "${sets[activeSetIdx]?.name}".`;
        if (noResTalents.length > 0) msg += `\n\n⚠️ ${noResTalents.length} talento${noResTalents.length>1?'s':''} importado${noResTalents.length>1?'s':''} sin recursos (${noResTalents.map(c=>c.name).join(', ')}). Edítalos para añadir sus recursos.`;
        alert(msg);
      } catch(err) {
        alert('Error al parsear el CSV: ' + err.message);
      }
    };
    reader.readAsText(file, 'utf-8');
    e.target.value = '';
  }, [sets, activeSetIdx, setCards]);

  const typeOrder = ['all','talento','cliente','inversion','estrategia','accion_urgente'];

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div className="sidebar">
        <div className="app-logo">The <span>Agency</span> Game</div>
        <div style={{fontSize:11,color:'#475569',marginTop:2}}>Card Viewer v0.3</div>

        {/* ── Card Sets ── */}
        <div className="sidebar-title">Card Sets</div>
        <div className="set-list">
          {sets.map((s,i)=>(
            <button key={i} className={`set-item ${i===activeSetIdx?'active':''}`} onClick={()=>setActiveSetIdx(i)}>
              <span style={{width:6,height:6,borderRadius:'50%',background:i===activeSetIdx?'#6366f1':'#2d3347',flexShrink:0,display:'inline-block'}}/>
              <span style={{flex:1,textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</span>
              <span style={{fontSize:10,color:'#475569',flexShrink:0}}>{s.cards.length}c</span>
              {sets.length>1&&<span
                onClick={e=>{e.stopPropagation();handleDeleteSet(i);}}
                style={{fontSize:10,color:'#475569',cursor:'pointer',padding:'0 2px',flexShrink:0}}
                title="Eliminar set">✕</span>}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:4,marginBottom:4}}>
          <input
            value={newSetName}
            onChange={e=>setNewSetName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleNewSet()}
            placeholder="Nombre..."
            style={{flex:1,background:'#1e2130',border:'1px solid #2d3347',borderRadius:6,padding:'5px 8px',fontSize:11,color:'#e2e8f0',minWidth:0,outline:'none'}}
          />
          <button className="btn btn-primary" style={{padding:'5px 10px',fontSize:11,flexShrink:0}} onClick={handleNewSet}>+ Nuevo</button>
        </div>
        <button className="btn btn-secondary" style={{width:'100%',marginBottom:4,fontSize:12}} onClick={()=>loadInputRef.current?.click()}>
          📂 Cargar desde JSON
        </button>
        <input ref={loadInputRef} type="file" accept=".json" style={{display:'none'}} onChange={handleLoadFile}/>

        {/* ── Tipo ── */}
        <div className="sidebar-title">Tipo</div>
        {typeOrder.map(t=>{
          const cfg=TYPE_CONFIG[t];
          return (
            <button key={t} className={`filter-btn ${typeFilter===t?'active':''}`} onClick={()=>setTypeFilter(t)}>
              {t==='all'?'🃏':cfg.icon} {t==='all'?'Todas las cartas':cfg.label}
              <span className="filter-count">{typeCounts[t]||0}</span>
            </button>
          );
        })}

        {/* ── Misión ── */}
        <div className="sidebar-title">Misión</div>
        <button className={`filter-btn ${missionFilter==='all'?'active':''}`} onClick={()=>setMissionFilter('all')}>
          🌐 Todas <span className="filter-count">{cards.filter(c=>c.mision).length}</span>
        </button>
        {MISSIONS.map(m=>(
          <button key={m} className={`filter-btn ${missionFilter===m?'active':''}`} onClick={()=>setMissionFilter(m)}>
            {MISSION_EMOJI[m]} {m.charAt(0).toUpperCase()+m.slice(1)}
            <span className="filter-count">{cards.filter(c=>c.mision===m).length}</span>
          </button>
        ))}

        {/* ── Costo ── */}
        <div className="sidebar-title">Costo máximo</div>
        <div style={{padding:'0 4px'}}>
          <input type="range" className="range-slider" min={0} max={20} value={maxCost} onChange={e=>setMaxCost(Number(e.target.value))} style={{width:'100%'}}/>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#64748b',marginTop:3}}>
            <span>0K</span><span style={{color:'#f1f5f9',fontWeight:600}}>{maxCost}K</span><span>20K</span>
          </div>
        </div>

        {/* ── Leyenda ── */}
        <div className="sidebar-title">Leyenda de recursos</div>
        {Object.entries(RESOURCE_LABELS).map(([type,label])=>(
          <div key={type} className="res-legend">
            <ResourceIconSVG type={type} size={20}/>
            <span className="res-name" style={{color:RESOURCE_COLORS[type]}}>{label}</span>
          </div>
        ))}

        <div style={{marginTop:'auto',paddingTop:20,display:'flex',flexDirection:'column',gap:6}}>
          <button className="btn btn-secondary" style={{width:'100%'}} onClick={handleDownloadSet}>
            ⬇️ Guardar "{sets[activeSetIdx]?.name}"
          </button>
          <div style={{display:'flex',gap:4}}>
            <button className="btn btn-secondary" style={{flex:1}} onClick={handleExportCSV}>
              📊 Exportar CSV
            </button>
            <button className="btn btn-secondary" style={{flex:1}} onClick={()=>importCsvRef.current?.click()}>
              📥 Importar CSV
            </button>
          </div>
          <input ref={importCsvRef} type="file" accept=".csv,text/csv" style={{display:'none'}} onChange={handleImportCSV}/>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <input className="search-input" placeholder="🔍  Buscar por nombre, efecto o flavor text..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:400}}/>
          <div style={{fontSize:13,color:'#64748b',marginLeft:'auto'}}>{filtered.length} carta{filtered.length!==1?'s':''} encontrada{filtered.length!==1?'s':''}</div>
          <button className="btn btn-secondary" style={{flexShrink:0,padding:'7px 12px',fontSize:13}} onClick={()=>setShowColorEditor(true)}>🎨 Colores</button>
          <button className="btn btn-primary" style={{flexShrink:0,padding:'7px 14px',fontSize:13}} onClick={()=>setShowCreate(true)}>✨ Nueva carta</button>
        </div>
        {filtered.length===0
          ?<div className="empty-state"><div className="empty-icon">🔍</div><div>No hay cartas que coincidan</div></div>
          :<div className="card-grid">{filtered.map(c=><CardItem key={c.id} card={c} onClick={setSelectedCard}/>)}</div>
        }
      </div>

      {showColorEditor&&<MissionColorEditor colors={missionColors} onChange={setMissionColors} onClose={()=>setShowColorEditor(false)}/>}
      {selectedCard&&!editCard&&<CardDetailModal card={selectedCard} onClose={()=>setSelectedCard(null)} onEdit={c=>setEditCard(c)}/>}
      {editCard&&<EditModal card={editCard} onClose={()=>setEditCard(null)} onSave={handleSave}/>}
      {showCreate&&<CreateCardModal onClose={()=>setShowCreate(false)} onCreate={handleCreate}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));

</script>
</body>
</html>

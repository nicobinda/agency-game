<script>
/* ── Immediate touch-to-drag for mobile/iPad ── */
(function () {
  var dragging = false, dragSrc = null, ghost = null, lastOver = null;
  var offX = 0, offY = 0;

  function makeGhost(src, tx, ty) {
    var r = src.getBoundingClientRect();
    offX = tx - r.left;
    offY = ty - r.top;
    var g = src.cloneNode(true);
    g.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;opacity:0.85;'
      + 'margin:0;transition:none;transform:scale(1.05);'
      + 'width:' + r.width + 'px;height:' + r.height + 'px;'
      + 'left:' + r.left + 'px;top:' + r.top + 'px;';
    document.body.appendChild(g);
    return g;
  }

  function fire(el, type, cx, cy) {
    try { el.dispatchEvent(new DragEvent(type, { bubbles: true, cancelable: true, clientX: cx||0, clientY: cy||0 })); }
    catch(e) {
      var ev = document.createEvent('Event');
      ev.initEvent(type, true, true);
      el.dispatchEvent(ev);
    }
  }

  function elAt(x, y) {
    if (ghost) ghost.style.visibility = 'hidden';
    var el = document.elementFromPoint(x, y);
    if (ghost) ghost.style.visibility = '';
    return el;
  }

  document.addEventListener('touchstart', function (e) {
    var src = e.target.closest('[draggable="true"]');
    if (!src) return;
    e.preventDefault();
    var t = e.touches[0];
    dragging = true; dragSrc = src;
    ghost = makeGhost(src, t.clientX, t.clientY);
    fire(src, 'dragstart');
  }, { passive: false });

  document.addEventListener('touchmove', function (e) {
    if (!dragging) return;
    e.preventDefault();
    var t = e.touches[0];
    ghost.style.left = (t.clientX - offX) + 'px';
    ghost.style.top  = (t.clientY - offY) + 'px';
    var el = elAt(t.clientX, t.clientY);
    if (el !== lastOver) {
      if (lastOver) fire(lastOver, 'dragleave', t.clientX, t.clientY);
      lastOver = el;
    }
    if (el) fire(el, 'dragover', t.clientX, t.clientY);
  }, { passive: false });

  document.addEventListener('touchend', function (e) {
    if (!dragging) return;
    var t = e.changedTouches[0];
    var el = elAt(t.clientX, t.clientY);
    if (el) fire(el, 'drop', t.clientX, t.clientY);
    fire(dragSrc, 'dragend', t.clientX, t.clientY);
    ghost.remove();
    ghost = null; dragging = false; dragSrc = null; lastOver = null;
  }, { passive: false });

  document.addEventListener('touchcancel', function () {
    if (!dragging) return;
    fire(dragSrc, 'dragend');
    if (ghost) ghost.remove();
    ghost = null; dragging = false; dragSrc = null; lastOver = null;
  });
})();
</script>

function ResourceIconSVG({ type, size = 22, half = false }) {
  const data = RESOURCE_SVG[type];
  const fallbackColor = RESOURCE_COLORS[type] || '#475569';
  return (
    <svg
      width={half ? size / 2 : size}
      height={size}
      viewBox="0 0 544 544"
      preserveAspectRatio={half ? 'xMinYMid slice' : 'xMidYMid meet'}
      style={{display:'inline-block', flexShrink:0, overflow:'hidden'}}
      aria-label={RESOURCE_LABELS[type]||type}
    >
      {data && data.circles
        ? data.circles.map((c,i) => <circle key={i} cx={c.cx} cy={c.cy} r={c.r} fill={c.fill}/>)
        : <><circle cx="272" cy="272" r="272" fill={data ? data.color : fallbackColor}/>
            {data && <path d={data.d} fill="white" fillOpacity="0.6"/>}</>
      }
    </svg>
  );
}

function ResourceDots({ res, iconSize = 22 }) {
  const qty = res.qty || 1;
  const showIndividual = qty <= 4;
  return (
    <span className="resource-group" title={`${qty} ${RESOURCE_LABELS[res.type]||res.type}${res.flexible?' (flexible)':''}`}>
      {showIndividual
        ? Array.from({length:qty}).map((_,i)=><ResourceIconSVG key={i} type={res.type} size={iconSize} half={!!res.flexible}/>)
        : <><ResourceIconSVG type={res.type} size={iconSize} half={!!res.flexible}/><span className="resource-qty">x{qty}</span></>
      }
    </span>
  );
}

function ResourceDisplay({ resources, iconSize = 22 }) {
  if (!resources || resources.length === 0) return null;
  return (
    <div style={{display:'flex',flexWrap:'wrap',alignItems:'center',gap:2,marginTop:6}}>
      {resources.map((res,i)=><ResourceDots key={i} res={res} iconSize={iconSize}/>)}
    </div>
  );
}

// MoneyTag: renders a monetary value with small K, green for fees/income, red for costs
function MoneyTag({ amount, type = 'cost', style = {} }) {
  if (amount === undefined || amount === null) return null;
  const color = type === 'fee' ? '#4ade80' : '#f87171';
  return (
    <span style={{ color, fontWeight: 700, whiteSpace: 'nowrap', ...style }}>
      {amount}<span style={{ fontSize: '0.68em', fontWeight: 600, marginLeft: '1px', opacity: 0.85 }}>K</span>
    </span>
  );
}
const CostDisplay = ({cost}) => <MoneyTag amount={cost} type="cost"/>;

function CultureReq({ value }) {
  if (!value || value <= 0) return null;
  return (
    <div style={{fontSize:8.5, color:'#888', fontWeight:700, lineHeight:1.2, letterSpacing:'0.3px'}}>
      ✦{value}
    </div>
  );
}

function CostBox({ cost, recurring, align='center', bigSize=22 }) {
  const isRed = recurring;
  const display = recurring ? cost : (cost || 0);
  const color = isRed ? '#cc2222' : '#111111';
  return (
    <div style={{
      borderLeft:'1px solid #ccc7be', padding:'4px 9px', textAlign:align,
      display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center',
      minWidth:54, flexShrink:0, alignSelf:'stretch'
    }}>
      <CultureReq value={0}/>
      <div style={{fontSize:bigSize, fontWeight:900, lineHeight:1, color, fontFamily:'Inter,sans-serif'}}>
        {display}<span style={{fontSize:bigSize*0.52, fontWeight:700}}>K</span>
      </div>
      {isRed && <div style={{fontSize:7.5, color:'#cc2222', fontWeight:700, lineHeight:1.3}}>por turno</div>}
    </div>
  );
}

function CardTalento({card}) {
  const resources = card.resources || [];
  const sorted = [...resources].sort((a,b) => a.type==='manager' ? -1 : b.type==='manager' ? 1 : 0);

  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) > 145 ? '#111111' : '#ffffff';
}

// ─── GAME UTILITIES ───────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let _uid = 0;
function mkUid(c) {
  const base = { ...c, _uid: `${c.id}-${++_uid}` };
  if (c.type === 'cliente') return { ...base, currentLevel: 1 };
  return base;
}

// ── Active card set (can be swapped at runtime) ──
let _activeCardsData = CARDS_DATA;
function getCardsData() { return _activeCardsData; }

function buildMain() {
  const d = getCardsData();
  return shuffle([
    ...(d.talents||[]).map(mkUid),
    ...(d.investments||[]).map(mkUid),
    ...(d.strategies||[]).map(mkUid),
    ...(d.urgent_actions||[]).map(mkUid),
  ]);
}
function buildClients() { return shuffle((getCardsData().clients||[]).map(mkUid)); }

function createInitialState(ms = 4) {
  const main    = buildMain();
  const clients = buildClients();
  const HAND = 4;
  return {
    marketSize:   ms,
    turn: 0, money: 4, cultura: 2,
    resources: { creativo:0, desarrollo:0, analista:0, manager:0 },
    mainDeck:     main.slice(HAND + ms),
    clientDeck:   clients.slice(ms),
    hand:         main.slice(0, HAND),
    mesa:         [],
    discard:      [],
    mainMarket:   main.slice(HAND, HAND + ms),
    clientMarket: clients.slice(0, ms),
    ctx:   null,
    detail:null,
    log: ['🎮 Juego iniciado — Turno 0'],
  };
}

// ─── REDUCER HELPERS ─────────────────────────────────────────────────────────
function addLog(msg, s) { return { ...s, log: [msg, ...s.log].slice(0, 30) }; }

function removeFrom(s, zone, uid) {
  if (zone === 'hand')         return { ...s, hand:         s.hand.filter(c => c._uid !== uid) };
  if (zone === 'mesa')         return { ...s, mesa:         s.mesa.filter(c => c._uid !== uid) };
  if (zone === 'mainMarket')   return { ...s, mainMarket:   s.mainMarket.filter(c => c._uid !== uid) };
  if (zone === 'clientMarket') return { ...s, clientMarket: s.clientMarket.filter(c => c._uid !== uid) };
  if (zone === 'discard')      return { ...s, discard:      s.discard.filter(c => c._uid !== uid) };
  if (zone === 'mainDeck')     return { ...s, mainDeck:     s.mainDeck.filter(c => c._uid !== uid) };
  if (zone === 'clientDeck')   return { ...s, clientDeck:   s.clientDeck.filter(c => c._uid !== uid) };
  if (zone.startsWith('assigned-')) {
    const cUid = zone.slice(9);
    return { ...s, mesa: s.mesa.map(c => c._uid === cUid ? { ...c, assignedTalents: (c.assignedTalents||[]).filter(t => t._uid !== uid) } : c) };
  }
  return s;
}

function addTo(s, zone, card) {
  if (zone === 'hand')         return { ...s, hand:         [...s.hand, card] };
  if (zone === 'mesa') {
    const base = (card.type === 'cliente' && !card.assignedTalents) ? { ...card, assignedTalents: [] } : card;
    // Ensure position defaults (will be overwritten by MOVE's x,y if provided)
    const toAdd = { _x: 20, _y: 20, ...base };
    return { ...s, mesa: [...s.mesa, toAdd] };
  }
  if (zone === 'mainMarket')   return { ...s, mainMarket:   [...s.mainMarket, card] };
  if (zone === 'clientMarket') return { ...s, clientMarket: [...s.clientMarket, card] };
  if (zone === 'discard')      return { ...s, discard:      [card, ...s.discard] };
  if (zone === 'mainDeck')     return { ...s, mainDeck:     [card, ...s.mainDeck] };
  if (zone === 'clientDeck')   return { ...s, clientDeck:   [card, ...s.clientDeck] };
  if (zone.startsWith('assigned-')) {
    const cUid = zone.slice(9);
    return { ...s, mesa: s.mesa.map(c => c._uid === cUid ? { ...c, assignedTalents: [...(c.assignedTalents||[]), card] } : c) };
  }
  return s;
}

// Refills only the main market up to marketSize (called at start of each turn).
// Client market is never auto-refilled — it starts with 4 and stays at whatever count.
function refillMarkets(s) {
  let ns = { ...s };
  while (ns.mainMarket.length < ns.marketSize && ns.mainDeck.length > 0) {
    const [r, ...rd] = ns.mainDeck;
    ns = { ...ns, mainMarket: [...ns.mainMarket, r], mainDeck: rd };
  }
  return ns;
}

// ─── REDUCER ─────────────────────────────────────────────────────────────────
function reducer(state, action) {
  switch (action.type) {
    case 'DRAW_MAIN': {
      if (!state.mainDeck.length) return addLog('🚫 Mazo principal vacío', state);
      const [top, ...rest] = state.mainDeck;
      return addLog(`⬆️ Robaste: ${top.name}`, { ...state, mainDeck: rest, hand: [...state.hand, top] });
    }
    case 'DRAW_CLIENT': {
      if (!state.clientDeck.length) return addLog('🚫 Mazo de clientes vacío', state);
      const [top, ...rest] = state.clientDeck;
      return addLog(`⬆️ Cliente: ${top.name}`, { ...state, clientDeck: rest, hand: [...state.hand, top] });
    }
    case 'POSITION_CARD': {
      // Move a card freely within the mesa and bring it to front (last in array = top z-index)
      const { uid, x, y } = action;
      const card = state.mesa.find(c => c._uid === uid);
      if (!card) return state;
      const rest = state.mesa.filter(c => c._uid !== uid);
      return { ...state, mesa: [...rest, { ...card, _x: x, _y: y }] };
    }
    case 'MOVE': {
      const { card, fromZone, x, y } = action;
      // ── Auto-redirect: enforce client / non-client zone rules ──
      const isClient = card.type === 'cliente';
      let toZone = action.toZone;
      if (isClient  && toZone === 'mainMarket') toZone = 'clientMarket';
      if (isClient  && toZone === 'mainDeck')   toZone = 'clientDeck';
      if (!isClient && toZone === 'clientMarket') toZone = 'mainMarket';
      if (!isClient && toZone === 'clientDeck')   toZone = 'mainDeck';
      if (fromZone === toZone) return state;
      // Guard: clients can never be placed in an assigned-talent slot
      if (isClient && toZone.startsWith('assigned-')) return state;
      const zLabel = z => {
        if (z.startsWith('assigned-')) return 'Asignado a cliente';
        return { hand:'Mano', mesa:'Mesa', mainDeck:'Mazo Principal', clientDeck:'Mazo Clientes', discard:'Descarte', mainMarket:'Mercado Principal', clientMarket:'Mercado Clientes' }[z] || z;
      };
      let s = state;
      let culturaDelta = 0;
      const isTalent = card.type === 'talento';

      // ── Cultura tracking ──────────────────────────────────────────────────────
      // Each talent has a net cultura effect depending on its zone:
      //   hand/discard/deck/market → 0
      //   mesa (unassigned)        → -1
      //   assigned with mission match → +1
      //   assigned without match   → 0
      // Delta = newEffect - oldEffect
      if (isTalent) {
        const zoneEffect = (zone) => {
          if (zone === 'mesa') return -1;
          if (zone.startsWith('assigned-')) {
            // Talent always pays the -1 play cost while in any play zone.
            // Mission match gives +1 that offsets it → net 0; no match → net -1.
            const cUid = zone.slice(9);
            const client = s.mesa.find(c => c._uid === cUid);
            const matchBonus = (client && card.mision && client.mision && card.mision === client.mision) ? 1 : 0;
            return -1 + matchBonus;
          }
          return 0; // hand, discard, market, deck — not in play
        };
        culturaDelta = zoneEffect(toZone) - zoneEffect(fromZone);
      }

      // If removing a client from the mesa that has assigned talents → release them back to mesa
      if (fromZone === 'mesa' && card.type === 'cliente') {
        const mCard = s.mesa.find(c => c._uid === card._uid);
        if (mCard?.assignedTalents?.length) {
          // Each assigned talent returns to the mesa:
          // - it re-enters mesa so pays -1 for the mesa cost
          // - it loses its mission bonus if it had one (−1)
          // Net: -1 (mesa cost stays) + possibly -1 (lost mission bonus)
          mCard.assignedTalents.forEach(t => {
            if (t.type === 'talento') {
              // talent was in assigned slot (conceptually on mesa), now explicitly on mesa:
              // the mesa cost was already being paid implicitly; but mission bonus is lost
              if (t.mision && mCard.mision && t.mision === mCard.mision) {
                culturaDelta -= 1; // lose mission alignment bonus
              }
            }
          });
          s = { ...s, mesa: s.mesa.filter(c => c._uid !== card._uid) };      // remove client
          s = { ...s, mesa: [...s.mesa, ...mCard.assignedTalents] };          // release talents
          s = addTo(s, toZone, card);
          s = { ...s, cultura: (s.cultura || 0) + culturaDelta };
          return addLog(`↔️ ${card.name} → ${zLabel(toZone)}`, s);
        }
      }

      s = removeFrom(s, fromZone, card._uid);
      const cardWithPos = (toZone === 'mesa' && x !== undefined) ? { ...card, _x: x, _y: y } : card;
      s = addTo(s, toZone, cardWithPos);
      s = { ...s, cultura: (s.cultura || 0) + culturaDelta };
      return addLog(`↔️ ${card.name} → ${zLabel(toZone)}`, s);
    }
    case 'ADJUST': {
      if (action.res) {
        const v = Math.max(0, (state.resources[action.res] || 0) + action.d);
        return { ...state, resources: { ...state.resources, [action.res]: v } };
      }
      const newVal = (state[action.k] || 0) + action.d;
      // Cultura can go negative; all other stats are floored at 0
      const clamped = action.k === 'cultura' ? newVal : Math.max(0, newVal);
      return { ...state, [action.k]: clamped };
    }
    case 'SET_MKT_SIZE': {
      const ms = Math.max(1, Math.min(8, action.v));
      return { ...state, marketSize: ms };
    }
    case 'END_TURN': {
      const t = state.turn + 1;
      const MAX_HAND = 4;
      let s = state;

      // ── Helpers ─────────────────────────────────────────────────────────────
      // Sum resources produced by an array of talent cards
      const sumResources = (talents) => {
        const pool = {};
        (talents || []).forEach(tk => {
          (tk.resources || []).forEach(r => {
            pool[r.type] = (pool[r.type] || 0) + (r.qty || 1);
          });
        });
        return pool;
      };
      // Check if a resource pool satisfies a requirements array.
      // Hybrid resources act as wildcards for any type except 'manager'.
      const satisfies = (pool, reqs) => {
        if (!reqs || reqs.length === 0) return true;
        let hybridLeft = pool['hibrido'] || 0;
        return reqs.every(req => {
          const have = pool[req.type] || 0;
          const need = req.qty || 1;
          if (have >= need) return true;
          // Manager cannot be substituted by hybrid resources
          if (req.type === 'manager') return false;
          // Fill the shortfall with hybrid resources
          const gap = need - have;
          if (hybridLeft >= gap) { hybridLeft -= gap; return true; }
          return false;
        });
      };
      // Get the level definition object for a given level number
      const getLvl = (client, lvl) =>
        (client.levels || []).find(l => l.level === lvl) || null;

      // ── 0. Discard down to max hand size ────────────────────────────────────
      let discardNote = '';
      if (s.hand.length > MAX_HAND) {
        const n = s.hand.length - MAX_HAND;
        const discarded = s.hand.slice(MAX_HAND);
        s = { ...s, hand: s.hand.slice(0, MAX_HAND), discard: [...discarded, ...s.discard] };
        discardNote = ` · 🗑️ descarte ${n}`;
      }

      // ── 1. Level-up: clients that have resources for their next level ────────
      const levelUps = [];
      s = {
        ...s,
        mesa: s.mesa.map(card => {
          if (card.type !== 'cliente') return card;
          const cur = card.currentLevel || 1;
          const maxLvl = (card.levels || []).length;
          if (cur >= maxLvl) return card; // already at max
          const nextDef = getLvl(card, cur + 1);
          if (!nextDef) return card;
          const pool = sumResources(card.assignedTalents);
          if (satisfies(pool, nextDef.requirements)) {
            levelUps.push(card.name);
            return { ...card, currentLevel: cur + 1 };
          }
          return card;
        }),
      };
      if (levelUps.length) s = addLog(`⬆️ Subida de nivel: ${levelUps.join(', ')}`, s);

      // ── 2. Collect fees from clients with enough resources ───────────────────
      let totalFee = 0;
      const feeDetails = [];
      s.mesa.forEach(card => {
        if (card.type !== 'cliente') return;
        const cur = card.currentLevel || 1;
        const curDef = getLvl(card, cur);
        if (!curDef) return;
        const pool = sumResources(card.assignedTalents);
        if (satisfies(pool, curDef.requirements)) {
          const fee = curDef.fee || 0;
          if (fee > 0) { totalFee += fee; feeDetails.push(`${card.name} +${fee}K`); }
        }
      });
      if (totalFee > 0) {
        s = { ...s, money: (s.money || 0) + totalFee };
        s = addLog(`💰 Fees cobrados: +${totalFee}K (${feeDetails.join(', ')})`, s);
      }

      // ── 3. Pay recurring/maintenance costs for all cards in play ─────────────
      let totalCost = 0;
      const costDetails = [];
      const deductCost = (card) => {
        const rc = (card.recurringCost || 0) > 0 ? card.recurringCost
                 : (card.maintenanceCost || 0) > 0 ? card.maintenanceCost : 0;
        if (rc > 0) { totalCost += rc; costDetails.push(`${card.name} -${rc}K`); }
      };
      // Walk every position in the play area:
      // clients → iterate every assigned talent; non-clients → deduct directly
      s.mesa.forEach(card => {
        if (card.type === 'cliente') {
          (card.assignedTalents || []).forEach(t => deductCost(t));
        } else {
          deductCost(card);
        }
      });
      if (totalCost > 0) {
        s = { ...s, money: (s.money || 0) - totalCost };
        s = addLog(`💸 Costos por turno: -${totalCost}K (${costDetails.join(', ')})`, s);
      }

      // ── 4. Evict clients without enough resources for their current level ─────
      // Identify them first (before mutating mesa)
      const toEvict = s.mesa.filter(card => {
        if (card.type !== 'cliente') return false;
        const cur = card.currentLevel || 1;
        const curDef = getLvl(card, cur);
        if (!curDef) return false;
        const pool = sumResources(card.assignedTalents);
        return !satisfies(pool, curDef.requirements);
      });
      let culturaDelta = 0;
      toEvict.forEach(client => {
        const talents = client.assignedTalents || [];
        // Each released talent goes to the mesa → pays -1 cultura mesa cost
        // If it had a mission-match bonus with this client, that's also lost
        talents.forEach(tk => {
          if (tk.type === 'talento') {
            // Assigned (no match) → mesa: both are -1, delta = 0.
            // Assigned (match) → mesa: was 0 (−1 cost + 1 bonus), now −1, delta = −1.
            const hadMatch = tk.mision && client.mision && tk.mision === client.mision;
            if (hadMatch) culturaDelta -= 1;
          }
        });
        // Remove client from mesa, release talents onto mesa, send client to clientMarket
        s = { ...s, mesa: s.mesa.filter(c => c._uid !== client._uid) };
        s = { ...s, mesa: [...s.mesa, ...talents] };
        s = { ...s, clientMarket: [client, ...s.clientMarket] };
        s = addLog(`⚠️ ${client.name} sin recursos → Mercado de clientes`, s);
      });
      if (culturaDelta !== 0) {
        s = { ...s, cultura: (s.cultura || 0) + culturaDelta };
      }

      // ── 5. Draw one card from main deck ─────────────────────────────────────
      if (s.mainDeck.length > 0) {
        const [drawn, ...restDeck] = s.mainDeck;
        s = { ...s, mainDeck: restDeck, hand: [...s.hand, drawn] };
        s = addLog(`🃏 Robaste: ${drawn.name}`, s);
      } else {
        s = addLog('⚠️ Mazo principal vacío — no se robó carta', s);
      }

      // ── 6. Place top client from deck directly onto mesa ────────────────────
      if (s.clientDeck.length > 0) {
        const [newClient, ...restClients] = s.clientDeck;
        // Position the new client to avoid stacking exactly at (20,20)
        const clientsOnMesa = s.mesa.filter(c => c.type === 'cliente').length;
        const nx = 20 + clientsOnMesa * 30;
        const ny = 20 + clientsOnMesa * 20;
        const placed = { ...newClient, _x: nx, _y: ny, assignedTalents: newClient.assignedTalents || [] };
        s = { ...s, clientDeck: restClients, mesa: [...s.mesa, placed] };
        s = addLog(`👥 Nuevo cliente en mesa: ${newClient.name}`, s);
      } else {
        s = addLog('⚠️ Mazo de clientes vacío — no llegó cliente nuevo', s);
      }

      // ── 7. Refill main market ────────────────────────────────────────────────
      s = refillMarkets(s);
      s = { ...s, turn: t };
      s = addLog(`⏭️ ─── Turno ${t}${discardNote} ───`, s);
      return s;
    }
    case 'REORDER': {
      const { zone, cardUid, refUid, after } = action;
      const reorder = (arr) => {
        const card = arr.find(c => c._uid === cardUid);
        if (!card) return arr;
        const rest = arr.filter(c => c._uid !== cardUid);
        const refIdx = rest.findIndex(c => c._uid === refUid);
        if (refIdx === -1) return [...rest, card]; // append if ref not found
        const at = after ? refIdx + 1 : refIdx;
        return [...rest.slice(0, at), card, ...rest.slice(at)];
      };
      const simpleZones = ['hand','mesa','mainMarket','clientMarket','discard'];
      if (simpleZones.includes(zone)) return { ...state, [zone]: reorder(state[zone]) };
      if (zone.startsWith('assigned-')) {
        const cUid = zone.slice(9);
        return { ...state, mesa: state.mesa.map(c => c._uid === cUid ? { ...c, assignedTalents: reorder(c.assignedTalents||[]) } : c) };
      }
      return state;
    }
    case 'SET_LEVEL': {
      const upd = arr => arr.map(c => c._uid === action.uid ? { ...c, currentLevel: action.level } : c);
      return {
        ...state,
        hand:         upd(state.hand),
        mesa:         upd(state.mesa),
        mainMarket:   upd(state.mainMarket),
        clientMarket: upd(state.clientMarket),
        discard:      upd(state.discard),
        mainDeck:     upd(state.mainDeck),
        clientDeck:   upd(state.clientDeck),
      };
    }
    case 'SHUFFLE_MAIN':   return addLog('🔀 Mazo principal mezclado',  { ...state, mainDeck:   shuffle(state.mainDeck) });
    case 'SHUFFLE_CLIENT': return addLog('🔀 Mazo clientes mezclado',   { ...state, clientDeck: shuffle(state.clientDeck) });
    case 'CTX':    return { ...state, ctx: action.v, detail: null };
    case 'DETAIL': return { ...state, detail: action.card, ctx: null };
    case 'RESET':  _uid = 0; return createInitialState(state.marketSize);
    default: return state;
  }
}

// ─── SCALED CARD ─────────────────────────────────────────────────────────────
function ScaledCard({ card, scale, onClick, fromZone, onDragStart, onHover, onHoverEnd, dispatch, onDragEnterCard }) {
  const isL = card.type === 'cliente';
  const NW = isL ? 390 : 220, NH = isL ? 272 : 308;
  const W = Math.round(NW * scale), H = Math.round(NH * scale);
  const t  = card.type;
  const TC = TYPE_CONFIG[t] || {};
  const cls = [
    'card-item',
    TC.cls ? `card-${TC.cls}` : '',
    isL ? 'card-landscape' : 'card-portrait',
    (isL && card.mision) ? `mission-bg-${card.mision}` : '',
  ].filter(Boolean).join(' ');

  return (
    <div
      className="card-scaled"
      style={{ width: W, height: H }}
      draggable={true}
      onDragStart={e => { onDragStart && onDragStart(card, fromZone || 'unknown', e); }}
      onDragEnter={e => { onDragEnterCard && onDragEnterCard(card._uid, fromZone, e); }}
      onClick={onClick}
      onMouseEnter={e => onHover && onHover(card, e.clientX, e.clientY)}
      onMouseLeave={() => onHoverEnd && onHoverEnd()}
    >
      <div className="card-scaled-inner" style={{ width: NW, height: NH, transform: `scale(${scale})` }}>
        <div className={cls} style={{ width: NW, height: NH }}>
          {t === 'talento'        && <CardTalento card={card} />}
          {t === 'cliente'        && <CardCliente card={card} />}
          {t === 'inversion'      && <CardInversion card={card} />}
          {t === 'estrategia'     && <CardEstrategia card={card} />}
          {t === 'accion_urgente' && <CardUrgente card={card} />}
        </div>
      </div>
      {/* Level badge — only for multi-level client cards when dispatch is available */}
      {t === 'cliente' && dispatch && (card.levels?.length || 0) > 1 && (() => {
        const maxLevel = card.levels.length;
        const cur = card.currentLevel || 1;
        const next = (cur % maxLevel) + 1;
        const sz = Math.max(18, Math.round(26 * scale));
        return (
          <div
            onClick={e => { e.stopPropagation(); dispatch({ type:'SET_LEVEL', uid:card._uid, level:next }); }}
            title={`Nivel ${cur} de ${maxLevel} — click para avanzar`}
            style={{
              position:'absolute', top:4, right:4, zIndex:10,
              width:sz, height:sz, borderRadius:'50%',
              background:'rgba(10,10,20,0.82)', color:'#f8fafc',
              border:'1.5px solid rgba(255,255,255,0.35)',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize: Math.max(10, Math.round(13 * scale)), fontWeight:900,
              cursor:'pointer', userSelect:'none',
              boxShadow:'0 2px 8px rgba(0,0,0,0.5)',
            }}
          >{cur}</div>
        );
      })()}
    </div>
  );
}

// ─── HOVER PREVIEW ───────────────────────────────────────────────────────────
function HoverPreview({ hoverCard }) {
  if (!hoverCard) return null;
  const { card, x, y } = hoverCard;
  const isL = card.type === 'cliente';
  const SCALE = isL ? 0.85 : 1.05;
  const NW = isL ? 390 : 220, NH = isL ? 272 : 308;
  const W = Math.round(NW * SCALE), H = Math.round(NH * SCALE);

  let px = x + 18;
  let py = y - Math.round(H / 2);
  if (px + W > window.innerWidth  - 8) px = x - W - 18;
  if (py < 8) py = 8;
  if (py + H > window.innerHeight - 8) py = window.innerHeight - H - 8;

  return (
    <div style={{
      position:'fixed', left:px, top:py, zIndex:150,
      pointerEvents:'none',
      filter:'drop-shadow(0 10px 30px rgba(0,0,0,0.7))',
      transition:'opacity .1s',
    }}>
      <ScaledCard card={card} scale={SCALE} onClick={() => {}} fromZone="preview"/>
    </div>
  );
}

// ─── DROP ZONE WRAPPER ───────────────────────────────────────────────────────
function DropZone({ zone, dropZone, handlers, style, className, children }) {
  const { over, leave, drop } = handlers;
  const isActive = dropZone === zone;
  const activeClass = zone === 'discard' ? 'drop-active-red' : zone === 'mainDeck' || zone === 'clientDeck' ? 'drop-active-green' : 'drop-active';
  return (
    <div
      onDragOver={e => over(zone, e)}
      onDragLeave={e => leave(zone, e)}
      onDrop={e => drop(zone, e)}
      style={style}
      className={`${className || ''} ${isActive ? activeClass : ''}`}
    >
      {children}
    </div>
  );
}

// ─── STAT + RESOURCE TILES ───────────────────────────────────────────────────
function StatTile({ label, value, color, icon, onP, onM }) {
  return (
    <div className="stat-tile">
      <div className="stat-label">{icon} {label}</div>
      <div className="stat-value" style={{ color }}>{value}</div>
      <div className="stat-controls">
        <button className="stat-btn" onClick={onM}>−</button>
        <button className="stat-btn" onClick={onP}>+</button>
      </div>
    </div>
  );
}

function ResTile({ type, val, dispatch }) {
  const C = { creativo:'#DE6834', desarrollo:'#73C76C', analista:'#3A77E3', manager:'#4060a0' };
  const L = { creativo:'Crea', desarrollo:'Dev', analista:'Anal', manager:'Mgr' };
  return (
    <div className="stat-tile" style={{ minWidth:54, padding:'3px 6px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:3 }}>
        <ResourceIconSVG type={type} size={13}/>
        <span className="stat-label">{L[type]}</span>
      </div>
      <div className="stat-value" style={{ color:C[type], fontSize:16 }}>{val}</div>
      <div className="stat-controls">
        <button className="stat-btn" onClick={() => dispatch({ type:'ADJUST', res:type, d:-1 })}>−</button>
        <button className="stat-btn" onClick={() => dispatch({ type:'ADJUST', res:type, d:1 })}>+</button>
      </div>
    </div>
  );
}

// ─── DECK PILE ───────────────────────────────────────────────────────────────
function DeckPile({ label, icon, count, color, onDraw, onShuffle, zone, dropZone, handlers }) {
  const { over, leave, drop } = handlers;
  const isActive = dropZone === zone;
  return (
    <div
      className={`deck-pile${isActive ? ' drop-active-green' : ''}`}
      style={{ transition:'outline .1s, background .1s' }}
      onClick={onDraw}
      onDragOver={e => over(zone, e)}
      onDragLeave={e => leave(zone, e)}
      onDrop={e => drop(zone, e)}
      title={`Click: robar | Arrastrar aquí: poner arriba del mazo`}
    >
      <div style={{ fontSize:19 }}>{icon}</div>
      <div className="deck-pile-label">{label}</div>
      <div className="deck-pile-count" style={{ color }}>{count}</div>
      <button className="deck-pill-btn" onClick={e => { e.stopPropagation(); onShuffle(); }}>🔀</button>
    </div>
  );
}

// ─── DISCARD PILE ────────────────────────────────────────────────────────────
function DiscardPile({ top, count, dispatch, zone, dropZone, handlers, startDrag }) {
  const { over, leave, drop } = handlers;
  const isActive = dropZone === zone;
  return (
    <div
      className={`deck-pile${isActive ? ' drop-active-red' : ''}`}
      style={{ opacity: count ? 1 : 0.45, transition:'outline .1s, background .1s' }}
      onClick={() => top && dispatch({ type:'CTX', v:{ card:top, zone:'discard', x:70, y:300 } })}
      onDragOver={e => over(zone, e)}
      onDragLeave={e => leave(zone, e)}
      onDrop={e => drop(zone, e)}
      title="Arrastrá cartas aquí para descartar"
    >
      <div style={{ fontSize:19 }}>🗑️</div>
      <div className="deck-pile-label">Descarte</div>
      <div className="deck-pile-count" style={{ color:'#cc7070' }}>{count}</div>
      {top && (
        <div
          draggable={true}
          onDragStart={e => { e.stopPropagation(); startDrag(top, 'discard', e); }}
          style={{ fontSize:8, color:'#64748b', textAlign:'center', maxWidth:108, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', cursor:'grab' }}
        >{top.name}</div>
      )}
    </div>
  );
}

// ─── CONTEXT MENU ────────────────────────────────────────────────────────────
function CtxMenu({ ctx, dispatch }) {
  if (!ctx) return null;
  const { card, zone, x, y } = ctx;
  const TC = TYPE_CONFIG[card.type] || {};
  const hide = () => dispatch({ type:'CTX', v:null });
  const acts = [];

  if (zone === 'hand') {
    acts.push({ icon:'🃏', label:'Jugar a mesa',      fn:() => { dispatch({ type:'MOVE', card, fromZone:'hand', toZone:'mesa'    }); hide(); } });
    acts.push({ icon:'🗑️', label:'Descartar',          fn:() => { dispatch({ type:'MOVE', card, fromZone:'hand', toZone:'discard' }); hide(); }, danger:true });
    acts.push({ icon:'🔝', label:'Poner en mazo',      fn:() => {
      const tz = card.type === 'cliente' ? 'clientDeck' : 'mainDeck';
      dispatch({ type:'MOVE', card, fromZone:'hand', toZone:tz }); hide();
    } });
  }
  if (zone === 'mesa') {
    acts.push({ icon:'✋', label:'Volver a mano',      fn:() => { dispatch({ type:'MOVE', card, fromZone:'mesa', toZone:'hand'    }); hide(); } });
    acts.push({ icon:'🗑️', label:'Descartar',          fn:() => { dispatch({ type:'MOVE', card, fromZone:'mesa', toZone:'discard' }); hide(); }, danger:true });
  }
  if (zone.startsWith('assigned-')) {
    acts.push({ icon:'🃏', label:'Desasignar a mesa',  fn:() => { dispatch({ type:'MOVE', card, fromZone:zone, toZone:'mesa'    }); hide(); } });
    acts.push({ icon:'✋', label:'Volver a mano',       fn:() => { dispatch({ type:'MOVE', card, fromZone:zone, toZone:'hand'    }); hide(); } });
    acts.push({ icon:'🗑️', label:'Descartar',           fn:() => { dispatch({ type:'MOVE', card, fromZone:zone, toZone:'discard' }); hide(); }, danger:true });
  }
  if (zone === 'mainMarket' || zone === 'clientMarket') {
    acts.push({ icon:'✅', label:'Adquirir a mano',    fn:() => { dispatch({ type:'MOVE', card, fromZone:zone,   toZone:'hand'    }); hide(); } });
    acts.push({ icon:'🗑️', label:'Descartar del mercado', fn:() => { dispatch({ type:'MOVE', card, fromZone:zone, toZone:'discard'}); hide(); }, danger:true });
  }
  if (zone === 'discard') {
    acts.push({ icon:'✋', label:'Volver a mano',      fn:() => { dispatch({ type:'MOVE', card, fromZone:'discard', toZone:'hand' }); hide(); } });
    acts.push({ icon:'🔝', label:'Devolver al mazo',   fn:() => {
      const tz = card.type === 'cliente' ? 'clientDeck' : 'mainDeck';
      dispatch({ type:'MOVE', card, fromZone:'discard', toZone:tz }); hide();
    } });
  }
  acts.push({ icon:'🔍', label:'Ver detalle',          fn:() => dispatch({ type:'DETAIL', card }) });

  const mw = 174;
  const mh = acts.length * 33 + 56;
  const px = Math.min(x, window.innerWidth  - mw - 8);
  const py = Math.min(y, window.innerHeight - mh - 8);

  // Card preview sizing
  const PREV_SCALE = card.type === 'cliente' ? 0.78 : 0.95;
  const isLCard = card.type === 'cliente';
  const pNW = isLCard ? 390 : 220, pNH = isLCard ? 272 : 308;
  const pW = Math.round(pNW * PREV_SCALE), pH = Math.round(pNH * PREV_SCALE);
  const previewLeft = px > pW + 24;
  const prevX = previewLeft ? px - pW - 12 : px + mw + 12;
  const prevY = Math.max(8, Math.min(py, window.innerHeight - pH - 8));

  return (<>
    <div className="ctx-overlay" onClick={hide}/>
    {/* Card preview alongside menu */}
    <div style={{
      position:'fixed', left:prevX, top:prevY, zIndex:201,
      pointerEvents:'none',
      filter:'drop-shadow(0 10px 30px rgba(0,0,0,0.7))',
    }}>
      <ScaledCard card={card} scale={PREV_SCALE} onClick={() => {}} fromZone="preview"/>
    </div>
    <div className="ctx-menu" style={{ left:px, top:py }}>
      <div className="ctx-title">
        {card.name}
        <div className="ctx-sub"><span className={`badge badge-${TC.cls||''}`}>{TC.icon} {TC.label}</span></div>
      </div>
      {acts.map((a, i) => (
        <button key={i} className={`ctx-btn${a.danger ? ' danger' : ''}`} onClick={a.fn}>
          <span>{a.icon}</span> {a.label}
        </button>
      ))}
    </div>
  </>);
}

// ─── DETAIL OVERLAY ──────────────────────────────────────────────────────────
function DetailOverlay({ card, dispatch }) {
  if (!card) return null;
  const scale = card.type === 'cliente' ? 1.1 : 1.25;
  return (
    <div className="detail-overlay" onClick={() => dispatch({ type:'DETAIL', card:null })}>
      <div className="detail-box" onClick={e => e.stopPropagation()}>
        <button className="detail-close-btn" onClick={() => dispatch({ type:'DETAIL', card:null })}>✕ Cerrar</button>
        <ScaledCard card={card} scale={scale} onClick={() => {}} fromZone="detail"/>
      </div>
    </div>
  );
}

// ─── MARKET SECTION ───────────────────────────────────────────────────────────
function MarketSection({ title, zone, cards, scale, dropZone, handlers, openCtx, startDrag, onHover, onHoverEnd, color, dispatch, onCardDragEnter, insertPoint, wrapStyle }) {
  return (
    <div className="sim-market-section" style={{ flex:1, minHeight:0, overflow:'hidden', display:'flex', flexDirection:'column', ...wrapStyle }}>
      <div className="zone-label-right" style={{ color }}>
        <span>{title}</span>
        <span style={{ color:'#2a3050', fontWeight:400 }}>{cards.length} cartas</span>
      </div>
      <DropZone zone={zone} dropZone={dropZone} handlers={handlers}
        style={{ flex:1, overflow:'auto', padding:'8px 7px', display:'flex', flexWrap:'wrap', flexDirection:'row', gap:8, alignContent:'flex-start' }}>
        {cards.length === 0 && (
          <div style={{ color:'#2a3050', fontSize:11, textAlign:'center', padding:'12px 0' }}>Mercado vacío</div>
        )}
        {cards.flatMap(card => {
          const ip = insertPoint?.zone === zone;
          const before = ip && insertPoint.uid === card._uid && !insertPoint.after;
          const after  = ip && insertPoint.uid === card._uid &&  insertPoint.after;
          return [
            before && <div key={`ins-b-${card._uid}`} className="insert-line"/>,
            <ScaledCard key={card._uid}
              card={card} scale={scale} fromZone={zone}
              onDragStart={startDrag} onHover={onHover} onHoverEnd={onHoverEnd}
              onClick={e => openCtx(card, zone, e)}
              dispatch={dispatch}
              onDragEnterCard={onCardDragEnter}
            />,
            after && <div key={`ins-a-${card._uid}`} className="insert-line"/>,
          ].filter(Boolean);
        })}
      </DropZone>
    </div>
  );
}

// ─── CLIENT WITH TALENTS ─────────────────────────────────────────────────────
function ClientWithTalents({ card, scale, startDrag, openCtx, onHover, onHoverEnd, dropZone, handlers, dragType, dispatch, onCardDragEnter, insertPoint }) {
  const talentW = Math.round(220 * scale);
  const talentH = Math.round(308 * scale);
  const clientW = Math.round(390 * scale);
  // Each stacked talent is offset so its resource strip + a bit of the card is visible
  const STRIP = Math.round(72 * scale);

  const assigned = card.assignedTalents || [];
  const assignedZone = `assigned-${card._uid}`;
  const isDropTarget = dragType === 'talento' && dropZone === assignedZone;

  // Total width of the talent fan
  const stackW = assigned.length > 0 ? STRIP * (assigned.length - 1) + talentW : 0;
  const totalW = Math.max(clientW, stackW);

  return (
    <div style={{ display:'inline-flex', flexDirection:'column', gap:5, verticalAlign:'top' }}>
      {/* Client card — becomes a drop target when a talent is being dragged */}
      <div
        onDragOver={e => { if (dragType === 'talento') { e.preventDefault(); e.stopPropagation(); handlers.over(assignedZone, e); } }}
        onDragLeave={e => handlers.leave(assignedZone, e)}
        onDrop={e => { if (dragType === 'talento') handlers.drop(assignedZone, e); }}
        style={{
          borderRadius: 10,
          outline: isDropTarget ? '2px dashed rgba(52,211,153,0.85)' : '2px dashed transparent',
          boxShadow: isDropTarget ? '0 0 16px rgba(52,211,153,0.25)' : 'none',
          transition: 'outline .1s, box-shadow .1s',
        }}
      >
        <ScaledCard card={card} scale={scale} fromZone="mesa"
          onDragStart={startDrag} onHover={onHover} onHoverEnd={onHoverEnd}
          onClick={e => openCtx(card, 'mesa', e)} dispatch={dispatch}/>
      </div>
      {/* Stacked assigned talents — each offset to the right showing the left resource strip */}
      {assigned.length > 0 && (
        <div style={{ position:'relative', width: totalW, height: talentH, flexShrink:0 }}>
          {assigned.map((t, i) => {
            const ip = insertPoint?.zone === assignedZone;
            const isBefore = ip && insertPoint.uid === t._uid && !insertPoint.after;
            return (
              <div key={t._uid} style={{ position:'absolute', left: i * STRIP, top:0, zIndex: i }}>
                {isBefore && <div style={{ position:'absolute', left:-4, top:0, bottom:0, width:3, background:'rgba(99,102,241,0.9)', borderRadius:3, zIndex:20 }}/>}
                <ScaledCard card={t} scale={scale} fromZone={assignedZone}
                  onDragStart={startDrag} onHover={onHover} onHoverEnd={onHoverEnd}
                  onClick={e => openCtx(t, assignedZone, e)}
                  onDragEnterCard={onCardDragEnter}/>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [state, dispatch] = useReducer(reducer, null, () => createInitialState(4));
  const {
    turn, money, cultura, resources,
    mainDeck, clientDeck, hand, mesa, discard,
    mainMarket, clientMarket,
    marketSize, ctx, detail, log,
  } = state;

  // ── Card Set Loader ──
  const loadSetRef = useRef(null);
  const [activeSetName, setActiveSetName] = useState('Default');
  const handleLoadSet = useCallback(e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        _activeCardsData = data;
        setActiveSetName(file.name.replace(/\.json$/i,''));
        dispatch({ type:'RESET' });
      } catch(err) { alert('Error al cargar el set: '+err.message); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }, []);

  // ── Drag & Drop ──
  const dragRef  = useRef(null);
  const [dropZone, setDropZone] = useState(null);
  const [dragType, setDragType] = useState(null);
  // Intra-zone reorder: track where to insert the dragged card
  const insertRef = useRef(null);   // { zone, uid, after } — kept in sync with state for use in callbacks
  const [insertPoint, setInsertPoint] = useState(null);
  const setInsert = useCallback((v) => { insertRef.current = v; setInsertPoint(v); }, []);
  const [cardZoom, setCardZoom] = useState(1.0);
  const [rightWidth, setRightWidth] = useState(584);
  const isResizingRef = useRef(false);
  const [isResizing, setIsResizing] = useState(false);

  const startResize = useCallback((e) => {
    e.preventDefault();
    const startX     = e.clientX;
    const startWidth = rightWidth;
    isResizingRef.current = true;
    setIsResizing(true);
    const onMove = (ev) => {
      const delta    = startX - ev.clientX;
      const newWidth = Math.max(160, Math.min(680, startWidth + delta));
      setRightWidth(newWidth);
    };
    const onUp = () => {
      isResizingRef.current = false;
      setIsResizing(false);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  }, [rightWidth]);

  const [handHeight, setHandHeight] = useState(206);
  const [isResizingH, setIsResizingH] = useState(false);

  const startHandResize = useCallback((e) => {
    e.preventDefault();
    const startY      = e.clientY;
    const startHeight = handHeight;
    setIsResizingH(true);
    const onMove = (ev) => {
      const delta     = startY - ev.clientY;   // drag up → hand taller
      const newHeight = Math.max(80, Math.min(500, startHeight + delta));
      setHandHeight(newHeight);
    };
    const onUp = () => {
      setIsResizingH(false);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  }, [handHeight]);

  // ── Hover Preview ──
  const [hoverCard, setHoverCard] = useState(null);
  const hoverTimer = useRef(null);
  const onHover = useCallback((card, x, y) => {
    clearTimeout(hoverTimer.current);
    hoverTimer.current = setTimeout(() => setHoverCard({ card, x, y }), 2000);
  }, []);
  const onHoverEnd = useCallback(() => {
    clearTimeout(hoverTimer.current);
    hoverTimer.current = setTimeout(() => setHoverCard(null), 120);
  }, []);

  const startDrag = useCallback((card, fromZone, e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    dragRef.current = {
      card, fromZone,
      grabOffset: { x: e.clientX - rect.left, y: e.clientY - rect.top },
    };
    setDragType(card.type);
    setInsert(null);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card._uid); // required in Firefox
  }, [setInsert]);

  // Clear drag state whenever a drag ends (drop or cancelled)
  useEffect(() => {
    const clear = () => { setDragType(null); setInsert(null); };
    document.addEventListener('dragend', clear);
    return () => document.removeEventListener('dragend', clear);
  }, [setInsert]);

  // Intra-zone card drag-enter: sets the insertion point for same-zone reordering
  const onCardDragEnter = useCallback((uid, zone, e) => {
    const info = dragRef.current;
    if (!info || info.fromZone !== zone) return;  // only same-zone reorders
    if (info.card._uid === uid) return;           // dragging onto itself
    if (zone === 'mesa') return;                  // mesa uses free positioning, no snap
    const rect = e.currentTarget.getBoundingClientRect();
    const after = e.clientX >= rect.left + rect.width / 2;
    setInsert({ zone, uid, after });
  }, [setInsert]);

  const over = useCallback((zone, e) => {
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = 'move';
    setDropZone(zone);
  }, []);

  const leave = useCallback((zone, e) => {
    if (!e.currentTarget.contains(e.relatedTarget)) {
      setDropZone(prev => prev === zone ? null : prev);
      setInsert(prev => prev?.zone === zone ? null : prev);
    }
  }, [setInsert]);

  const drop = useCallback((toZone, e) => {
    e.preventDefault();
    e.stopPropagation();
    setDropZone(null);
    setDragType(null);
    const info = dragRef.current;
    const ins  = insertRef.current;
    dragRef.current = null;
    setInsert(null);
    if (!info) return;
    if (info.fromZone !== toZone) {
      // Cross-zone move
      dispatch({ type:'MOVE', card:info.card, fromZone:info.fromZone, toZone });
    } else if (ins && ins.zone === toZone) {
      // Same-zone reorder
      dispatch({ type:'REORDER', zone:toZone, cardUid:info.card._uid, refUid:ins.uid, after:ins.after });
    }
  }, [setInsert]);

  const handlers = { over, leave, drop };

  // ── Mesa free-positioning drop ──
  const mesaRef = useRef(null);
  const mesaDrop = useCallback((e) => {
    e.preventDefault();
    e.stopPropagation();
    setDropZone(null);
    setDragType(null);
    const info = dragRef.current;
    dragRef.current = null;
    setInsert(null);
    if (!info || !mesaRef.current) return;
    const rect = mesaRef.current.getBoundingClientRect();
    const x = Math.max(0, e.clientX - rect.left - (info.grabOffset?.x ?? 0));
    const y = Math.max(0, e.clientY - rect.top  - (info.grabOffset?.y ?? 0));
    if (info.fromZone === 'mesa') {
      dispatch({ type:'POSITION_CARD', uid:info.card._uid, x, y });
    } else {
      dispatch({ type:'MOVE', card:info.card, fromZone:info.fromZone, toZone:'mesa', x, y });
    }
  }, [setInsert]);

  // ── Context menu ──
  const openCtx = useCallback((card, zone, e) => {
    e.preventDefault();
    e.stopPropagation();
    dispatch({ type:'CTX', v:{ card, zone, x:e.clientX, y:e.clientY } });
  }, []);

  // ── Scale for market - use smaller scale for portrait cards so they fit
  const cardScale = Math.round(0.54 * cardZoom * 100) / 100;
  const mktScale  = cardScale;
  const handScale = cardScale;
  const mesaScale = cardScale;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>

      {/* ── STATUS BAR ── */}
      <div className="sim-statusbar">
        <div className="turn-badge">Turno <span className="turn-number">{turn}</span></div>
        <StatTile label="Dinero" icon="💰" value={`${money}K`} color="#fbbf24"
          onP={() => dispatch({ type:'ADJUST', k:'money',   d:1 })}
          onM={() => dispatch({ type:'ADJUST', k:'money',   d:-1 })}/>
        <StatTile label="Cultura" icon="✦" value={cultura} color="#a78bfa"
          onP={() => dispatch({ type:'ADJUST', k:'cultura', d:1 })}
          onM={() => dispatch({ type:'ADJUST', k:'cultura', d:-1 })}/>
        <div style={{ display:'flex', alignItems:'center', gap:3, background:'#1a1d27', border:'1px solid #2d3347', borderRadius:8, padding:'4px 8px' }}>
          <span style={{ fontSize:13 }}>🔍</span>
          <button className="stat-btn" onClick={() => setCardZoom(z => Math.max(0.4, Math.round((z-0.1)*10)/10))}>−</button>
          <span style={{ fontSize:12, fontWeight:700, color:'#94a3b8', minWidth:36, textAlign:'center' }}>{Math.round(cardZoom*100)}%</span>
          <button className="stat-btn" onClick={() => setCardZoom(z => Math.min(1.8, Math.round((z+0.1)*10)/10))}>+</button>
        </div>
        <button className="load-set-btn" onClick={() => loadSetRef.current?.click()} title="Cargar card set desde JSON">
          📂 <span style={{maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'inline-block',verticalAlign:'middle'}}>{activeSetName}</span>
        </button>
        <input ref={loadSetRef} type="file" accept=".json" style={{display:'none'}} onChange={handleLoadSet}/>
        <button className="end-turn-btn" onClick={() => dispatch({ type:'END_TURN' })}>Fin de Turno ⏭</button>
        <button className="reset-btn" onClick={() => dispatch({ type:'RESET' })} title="Reiniciar">↺</button>
      </div>

      {/* ── BOARD ── */}
      <div className="sim-board" style={{ userSelect: (isResizing || isResizingH) ? 'none' : 'auto' }}>

        {/* ── LEFT: DECKS + LOG ── */}
        <div className="sim-left">
          <div style={{ fontSize:8, fontWeight:700, textTransform:'uppercase', letterSpacing:1, color:'#2a3050' }}>Mazos</div>
          <DeckPile label="Principal" icon="🎴" count={mainDeck.length} color="#c8a060"
            zone="mainDeck" dropZone={dropZone} handlers={handlers}
            onDraw={() => dispatch({ type:'DRAW_MAIN' })}
            onShuffle={() => dispatch({ type:'SHUFFLE_MAIN' })}/>
          <DeckPile label="Clientes" icon="🤝" count={clientDeck.length} color="#7aaa90"
            zone="clientDeck" dropZone={dropZone} handlers={handlers}
            onDraw={() => dispatch({ type:'DRAW_CLIENT' })}
            onShuffle={() => dispatch({ type:'SHUFFLE_CLIENT' })}/>

          <div style={{ fontSize:8, fontWeight:700, textTransform:'uppercase', letterSpacing:1, color:'#2a3050', marginTop:4 }}>Descarte</div>
          <DiscardPile top={discard[0]||null} count={discard.length} dispatch={dispatch}
            zone="discard" dropZone={dropZone} handlers={handlers} startDrag={startDrag}/>

          <div style={{ flex:1 }}/>
          <div style={{ fontSize:8, fontWeight:700, textTransform:'uppercase', letterSpacing:1, color:'#2a3050' }}>Registro</div>
          <div style={{ background:'#0d1019', borderRadius:6, padding:'5px 7px', fontSize:9, lineHeight:1.75, maxHeight:120, overflowY:'auto' }}>
            {log.map((l, i) => <div key={i} style={{ color: i===0 ? '#94a3b8' : '#2d3450' }}>{l}</div>)}
          </div>
        </div>

        {/* ── CENTER: MESA + MANO ── */}
        <div className="sim-center">
          <div className="zone-label">
            <span>Mesa — {mesa.length} carta{mesa.length !== 1 ? 's' : ''}</span>
          </div>
          <div
            ref={mesaRef}
            className={`sim-mesa${dropZone === 'mesa' ? ' drop-active' : ''}`}
            onDragOver={e => { e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect = 'move'; setDropZone('mesa'); }}
            onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDropZone(null); }}
            onDrop={mesaDrop}
          >
            {mesa.length === 0 && (
              <div className="empty-zone" style={{ position:'absolute', inset:0, display:'flex' }}>
                <div><div style={{ fontSize:28, marginBottom:6 }}>🃏</div>Mesa vacía<br/><span style={{ fontSize:10 }}>Jugá o arrastá cartas aquí</span></div>
              </div>
            )}
            {mesa.map(card => (
              card.type === 'cliente'
                ? <div key={card._uid} style={{ position:'absolute', left: card._x ?? 20, top: card._y ?? 20 }}>
                    <ClientWithTalents card={card} scale={mesaScale}
                      startDrag={startDrag} openCtx={openCtx}
                      onHover={onHover} onHoverEnd={onHoverEnd}
                      dropZone={dropZone} handlers={handlers} dragType={dragType} dispatch={dispatch}
                      onCardDragEnter={onCardDragEnter} insertPoint={insertPoint}/>
                  </div>
                : <div key={card._uid} style={{ position:'absolute', left: card._x ?? 20, top: card._y ?? 20 }}>
                    <ScaledCard card={card} scale={mesaScale}
                      fromZone="mesa" onDragStart={startDrag}
                      onHover={onHover} onHoverEnd={onHoverEnd}
                      onClick={e => openCtx(card, 'mesa', e)} dispatch={dispatch}
                      onDragEnterCard={onCardDragEnter}/>
                  </div>
            ))}
          </div>

          {/* ── HORIZONTAL RESIZE HANDLE ── */}
          <div
            className={`resize-handle-h${isResizingH ? ' active' : ''}`}
            onMouseDown={startHandResize}
            title="Arrastrá para redimensionar la mano"
          />

          <div className="zone-label">
            <span>Mano — {hand.length} carta{hand.length !== 1 ? 's' : ''}</span>
          </div>
          <DropZone zone="hand" dropZone={dropZone} handlers={handlers}
            className="sim-hand" style={{ height: handHeight, minHeight: handHeight }}>
            {hand.length === 0 && <div style={{ color:'#2a3050', fontSize:11, margin:'auto' }}>Mano vacía — click en el mazo para robar</div>}
            {hand.flatMap(card => {
              const ip = insertPoint?.zone === 'hand';
              const before = ip && insertPoint.uid === card._uid && !insertPoint.after;
              const after  = ip && insertPoint.uid === card._uid &&  insertPoint.after;
              return [
                before && <div key={`ins-b-${card._uid}`} className="insert-line"/>,
                <ScaledCard key={card._uid} card={card} scale={handScale}
                  fromZone="hand" onDragStart={startDrag}
                  onHover={onHover} onHoverEnd={onHoverEnd}
                  onClick={e => openCtx(card, 'hand', e)} dispatch={dispatch}
                  onDragEnterCard={onCardDragEnter}/>,
                after && <div key={`ins-a-${card._uid}`} className="insert-line"/>,
              ].filter(Boolean);
            })}
          </DropZone>
        </div>

        {/* ── RESIZE HANDLE ── */}
        <div
          className={`resize-handle${isResizing ? ' active' : ''}`}
          onMouseDown={startResize}
          title="Arrastrá para redimensionar el mercado"
        />

        {/* ── RIGHT: MARKETS ── */}
        <div className="sim-right" style={{ width: rightWidth, minWidth: rightWidth }}>
          {/* Market size control */}
          <div className="mkt-size-ctrl">
            <span>Mercado</span>
            <button className="stat-btn" onClick={() => dispatch({ type:'SET_MKT_SIZE', v:marketSize-1 })}>−</button>
            <span className="mkt-size-val">{marketSize}</span>
            <button className="stat-btn" onClick={() => dispatch({ type:'SET_MKT_SIZE', v:marketSize+1 })}>+</button>
            <span style={{ marginLeft:2 }}>cartas</span>
          </div>

          {/* Client Market */}
          <MarketSection
            title="🤝 Clientes"
            zone="clientMarket"
            cards={clientMarket}
            scale={mktScale}
            dropZone={dropZone}
            handlers={handlers}
            openCtx={openCtx}
            startDrag={startDrag}
            onHover={onHover}
            onHoverEnd={onHoverEnd}
            color="#7aaa90"
            dispatch={dispatch}
            onCardDragEnter={onCardDragEnter}
            insertPoint={insertPoint}
          />

          <div className="mkt-divider"/>

          {/* Main Market */}
          <MarketSection
            title="🎴 Cartas"
            zone="mainMarket"
            cards={mainMarket}
            scale={mktScale}
            dropZone={dropZone}
            handlers={handlers}
            openCtx={openCtx}
            startDrag={startDrag}
            onHover={onHover}
            onHoverEnd={onHoverEnd}
            color="#c4a060"
            dispatch={dispatch}
            onCardDragEnter={onCardDragEnter}
            insertPoint={insertPoint}
            wrapStyle={{ flex:'none', height:handHeight, minHeight:handHeight, maxHeight:handHeight }}
          />
        </div>
      </div>

      <HoverPreview hoverCard={ctx ? null : hoverCard}/>
      <CtxMenu ctx={ctx} dispatch={dispatch}/>
      <DetailOverlay card={detail} dispatch={dispatch}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
